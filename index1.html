<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司專屬 - 笑話瀏覽趣 v2</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --fav-color: #e74c3c;
            --border-color: #e1e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background-color: #e0e0e0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .jokes-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .joke-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 18px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.03);
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .joke-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.08);
        }

        .joke-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 6px;
        }

        .joke-title {
            font-size: 17px;
            font-weight: bold;
            color: #2c3e50;
            padding-right: 45px;
        }

        .joke-id {
            font-size: 11px;
            color: var(--text-muted);
            background: #edf2f7;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .joke-snippet {
            font-size: 14px;
            line-height: 1.5;
            color: #718096;
        }

        .more-hint {
            color: var(--primary-color);
            font-size: 13px;
            font-weight: bold;
            margin-top: 5px;
            display: inline-block;
        }

        .fav-btn {
            background: none;
            border: none;
            font-size: 14px;
            cursor: pointer;
            position: absolute;
            top: 20px;
            right: 18px;
            color: #ccc;
            transition: color 0.2s, transform 0.1s;
            z-index: 5;
        }

        .fav-btn.is-fav {
            color: var(--fav-color);
        }

        .fav-btn:active {
            transform: scale(1.2);
        }

        .pagination {
            margin-top: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 50px;
            flex-wrap: wrap;
        }

        .page-btn {
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            background-color: white;
            color: var(--text-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            min-width: 38px;
            text-align: center;
        }

        .page-btn.active {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .page-btn:disabled {
            border-color: #e2e8f0;
            color: #cbd5e0;
            cursor: not-allowed;
            background-color: #f7fafc;
        }

        .page-btn:not(:disabled):not(.active):hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background-color: #edf2f7;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 15px;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 16px;
            width: 100%;
            max-width: 600px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }

        .modal-overlay.open .modal-content {
            transform: scale(1);
        }

        .modal-close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
        }

        .modal-close-btn:hover {
            color: #333;
        }

        .modal-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 15px;
            padding-right: 30px;
            border-bottom: 2px solid var(--bg-color);
            padding-bottom: 10px;
        }

        .modal-body {
            font-size: 16px;
            line-height: 1.7;
            white-space: pre-line;
            color: #2d3748;
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌟 公司笑話瀏覽特區 🌟</h1>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-all" onclick="switchMode('all')">全部笑話 (0)</button>
            <button class="tab-btn" id="tab-fav" onclick="switchMode('fav')">我的收藏 ❤️ (0)</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 輸入關鍵字搜尋笑話..." oninput="handleSearch()">
    </div>

    <div class="jokes-container" id="jokes-list"></div>
    <div class="pagination" id="pagination-controls"></div>

    <div class="modal-overlay" id="joke-modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal()">&times;</button>
            <div class="modal-title" id="modal-joke-title">笑話標題</div>
            <div class="modal-body" id="modal-joke-body">笑話完整內容</div>
        </div>
    </div>

        let favoriteIds = [];
        let currentMode = 'all';
        let currentPage = 1;
        const pageSize = 10; 
        let searchQuery = '';

        if (localStorage.getItem('joke_favorites')) {
            try {
                favoriteIds = JSON.parse(localStorage.getItem('joke_favorites'));
            } catch(e) {
                favoriteIds = [];
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            currentPage = 1;
            document.getElementById('tab-all').classList.toggle('active', mode === 'all');
            document.getElementById('tab-fav').classList.toggle('active', mode === 'fav');
            renderJokes();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            currentPage = 1;
            renderJokes();
        }

        function updateTabCounts() {
            let allFiltered = allJokes;
            if (searchQuery) {
                allFiltered = allJokes.filter(joke => 
                    joke.title.toLowerCase().includes(searchQuery) || 
                    joke.content.toLowerCase().includes(searchQuery)
                );
            }
            const favFiltered = allFiltered.filter(joke => favoriteIds.includes(joke.id));

            document.getElementById('tab-all').innerText = `全部笑話 (${allFiltered.length})`;
            document.getElementById('tab-fav').innerText = `我的收藏 ❤️ (${favFiltered.length})`;
        }

        function renderJokes() {
            const container = document.getElementById('jokes-list');
            const paginationContainer = document.getElementById('pagination-controls');
            container.innerHTML = '';
            paginationContainer.innerHTML = '';

            updateTabCounts();

            let filteredJokes = allJokes;
            if (currentMode === 'fav') {
                filteredJokes = allJokes.filter(joke => favoriteIds.includes(joke.id));
            }

            if (searchQuery) {
                filteredJokes = filteredJokes.filter(joke => 
                    joke.title.toLowerCase().includes(searchQuery) || 
                    joke.content.toLowerCase().includes(searchQuery)
                );
            }

            if (filteredJokes.length === 0) {
                container.innerHTML = `<div class="no-data">${currentMode === 'fav' ? '目前沒有符合搜尋或收藏的笑話喔！' : '找不到相關的笑話。'}</div>`;
                return;
            }

            const totalPages = Math.ceil(filteredJokes.length / pageSize);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = Math.min(startIndex + pageSize, filteredJokes.length);
            const pageJokes = filteredJokes.slice(startIndex, endIndex);

            pageJokes.forEach(joke => {
                const isFav = favoriteIds.includes(joke.id);
                let cleanContent = joke.content.replace(/\n/g, ' ');
                let snippet = cleanContent.length > 45 ? cleanContent.substring(0, 45) + '...' : cleanContent;

                const card = document.createElement('div');
                card.className = 'joke-card';
                card.onclick = () => openModal(joke.title, joke.content);
                
                card.innerHTML = `
                    <div class="joke-header">
                        <span class="joke-title">${escapeHtml(joke.title)}</span>
                        <span class="joke-id">編號: ${joke.id}　</span>
                    </div>
                    <div class="joke-snippet">${escapeHtml(snippet)}</div>
                    <div class="more-hint">📖 點擊看完整內容...</div>
                    <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="event.stopPropagation(); toggleFavorite(${joke.id})">
                        ${isFav ? '♥' : '♡'}
                    </button>
                `;
                container.appendChild(card);
            });

            if (totalPages > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'page-btn';
                prevBtn.innerText = '上一頁';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => changePage(currentPage - 1);
                paginationContainer.appendChild(prevBtn);

                for (let i = 1; i <= totalPages; i++) {
                    const pageNumBtn = document.createElement('button');
                    pageNumBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                    pageNumBtn.innerText = i;
                    pageNumBtn.onclick = () => changePage(i);
                    paginationContainer.appendChild(pageNumBtn);
                }

                const nextBtn = document.createElement('button');
                nextBtn.className = 'page-btn';
                nextBtn.innerText = '下一頁';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => changePage(currentPage + 1);
                paginationContainer.appendChild(nextBtn);
            }
        }

        function openModal(title, content) {
            document.getElementById('modal-joke-title').innerText = title;
            document.getElementById('modal-joke-body').innerText = content;
            document.getElementById('joke-modal').classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('joke-modal').classList.remove('open');
            document.body.style.overflow = '';
        }

        function changePage(page) {
            currentPage = page;
            renderJokes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFavorite(id) {
            const index = favoriteIds.indexOf(id);
            if (index === -1) {
                favoriteIds.push(id);
            } else {
                favoriteIds.splice(index, 1);
            }
            localStorage.setItem('joke_favorites', JSON.stringify(favoriteIds));
            renderJokes();
        }

        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
            });
        }

        renderJokes();
    </script>
