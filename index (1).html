<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司專屬 - 笑話瀏覽趣</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --primary-hover: #357abd;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --fav-color: #e74c3c;
            --border-color: #e1e4e8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 800px;
            margin-bottom: 25px;
            text-align: center;
        }

        header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 15px;
        }

        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            padding: 10px 24px;
            border: none;
            background-color: #e0e0e0;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--primary-color);
            color: white;
            box-shadow: 0 4px 6px rgba(74, 144, 226, 0.2);
        }

        .search-container {
            width: 100%;
            max-width: 800px;
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .search-input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--primary-color);
        }

        .jokes-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .joke-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid var(--border-color);
            position: relative;
            transition: transform 0.2s;
        }

        .joke-card:hover {
            transform: translateY(-2px);
        }

        .joke-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 8px;
        }

        .joke-title {
            font-size: 18px;
            font-weight: bold;
            color: #2c3e50;
            padding-right: 40px;
        }

        .joke-id {
            font-size: 12px;
            color: var(--text-muted);
            background: #edf2f7;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .joke-content {
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-line;
            color: #4a5568;
        }

        .fav-btn {
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            position: absolute;
            top: 18px;
            right: 20px;
            color: #ccc;
            transition: color 0.2s, transform 0.1s;
        }

        .fav-btn.is-fav {
            color: var(--fav-color);
        }

        .fav-btn:active {
            transform: scale(1.2);
        }

        .pagination {
            margin-top: 30px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 50px;
        }

        .page-btn {
            padding: 8px 16px;
            border: 1px solid var(--primary-color);
            background-color: white;
            color: var(--primary-color);
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .page-btn:disabled {
            border-color: #ccc;
            color: #ccc;
            cursor: not-allowed;
        }

        .page-btn:not(:disabled):hover {
            background-color: var(--primary-color);
            color: white;
        }

        #page-info {
            font-size: 14px;
            color: var(--text-muted);
        }

        .no-data {
            text-align: center;
            color: var(--text-muted);
            padding: 40px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🌟 公司笑話瀏覽特區 🌟</h1>
        <div class="nav-tabs">
            <button class="tab-btn active" id="tab-all" onclick="switchMode('all')">全部笑話</button>
            <button class="tab-btn" id="tab-fav" onclick="switchMode('fav')">我的收藏 ❤️</button>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 輸入關鍵字搜尋笑話..." oninput="handleSearch()">
    </div>

    <div class="jokes-container" id="jokes-list"></div>

    <div class="pagination" id="pagination-controls">
        <button class="page-btn" id="btn-prev" onclick="changePage(-1)">上一頁</button>
        <span id="page-info">第 1 / 1 頁</span>
        <button class="page-btn" id="btn-next" onclick="changePage(1)">下一頁</button>
    </div>

    <script>
        const allJokes = [{"id": 1, "title": "一位男子走進寵物店要買一隻鸚鵡", "content": "一位男子走進寵物店要買一隻鸚鵡，\n老闆指三隻外觀相同且同在一支棲息\n木上的鸚鵡說：『左邊那隻500元』\n這男子問：\n『為什麼這隻鸚鵡值這麼多錢？』\n老闆說：\n『這隻知道如何使用電腦』\n接著，他問中間那隻值多少，所得到\n的答案是1000元﹐因為這隻鸚鵡除了\n擁有第一隻所有的本事以外﹐它還懂\n得如何操作UNIX作業系統；\n很自然地﹐這男子驚奇地接著問第三\n隻的價格﹐答案是2000元；\n他問：『它能作什麼？』\n老闆回答：\n『老實說﹐我從未見過它作過什麼事\n；但其他兩隻都叫它老闆』"}, {"id": 2, "title": "一對已婚夫婦一起到醫院去待產", "content": "一對已婚夫婦一起到醫院去待產。\n他們到醫院時，醫生告知他們他發\n明了一部能將太太生產的陣痛傳送\n到先生身上的機器。他詢問夫婦是\n否願意嘗試。他們倆興緻勃勃的\n同意了。\n醫生一開始將開關設在10%的地方，\n解釋雖然只有10%的程度可能已是先\n生未曾經歷的疼痛。\n但是當生產開始時，先生沒有感覺，\n所以他要求醫生將疼痛程度提高。\n醫生接著將機器傳送疼痛的按鈕轉\n到20%的地方。\n先生還是沒什麼感覺。醫生量了先\n生的血壓與脈博很驚訝得發現他身\n體的狀況良好。\n此時，他們倆都決定要往50%嘗試。\n結果先生還是感覺一切正常。\n既然這能大量舒緩老婆的痛苦，於是\n他要醫生將所有的疼痛都傳送到他身\n上。老婆毫無痛苦地生下了健康的小\n孩。她和先生都很興奮。\n當他們回家時，發現郵差死在他們的\n前亭裡。"}, {"id": 3, "title": "一名學生走進年輕教授的辦公室", "content": "一名學生走進年輕教授的辦公室。\n她瞄了瞄大廳，把門關上，懇求的跪下來。\n『我願意做\"任何事\"來通過這堂考試。』\n她靠近他，輕甩秀髮，用著帶有某種意味的\n眼神看著他的眼睛。\n『我是說..』她輕聲地說，\n『我願意做\"任何事\"。』\n他回看著她。『任何事?』\n『任何事。』\n他的聲音變得柔和。『任何事?』\n『任何事。』\n他輕聲的說。『你願意\"用功\"嗎?』"}, {"id": 4, "title": "二位男子坐在診所外﹐其中一位哭的非常傷心﹐", "content": "二位男子坐在診所外﹐其中一位哭的非常傷心﹐\n故另一位便問他：\n『你為什麼哭泣呢？』\n第一位回答：\n『我來這裡作血液測試』\n第二位又問：\n『那又怎樣？你為什麼哭？難道你害怕嗎？』\n第一位回答：\n『不，只是在檢驗的過程中他們割我的手指』\n第二位在聽完後便開始哭泣起來，\n第一位吃驚地問他：\n『你為什麼哭泣呢？』\n第二位回答：\n『我來這裡作尿液測試』"}, {"id": 5, "title": "某天有兩個有錢人在鄉村聚樂部裡閒話家常", "content": "某天有兩個有錢人在鄉村聚樂部裡閒話家常。\n其中一人對另一個人說\n『嘿我告訴你我的司機實在很笨..你不認為嗎?』\n『你看看就知道』\n他把他的司機吉米叫了過來對他說『這裡有十元，\n到汽車展示區去給我買一輛Mercedes回來。』\n吉米回答，『是的，先生。我馬上就去。』就跑去\n汽車展示區了。\n有錢人對著他的朋友說，\n『看，我告訴你他很笨了吧!』而另一個有錢人說\n『那沒有什麼，你要看笨蛋，我就給你看笨蛋。\n接著他就叫他的司機比利過來，『比利，回家去看\n看我在不在家。』\n而比利回答，『是，先生，我馬上就去。』就跑回\n家了。\n『看到了吧?他甚至不用腦子想想如果我在這裡又\n怎麼可能會在家呢!』\n稍後，這兩個司機在街上相遇。吉米對比利說，\n『耶，你知道嗎我老板實在是太笨了，他竟然給\n我10元叫我去汽車展示區買一輛Mercedes給他..\n他不知道今天是星期日嗎?汽車展示區根本沒開!\n比利回答，『你認為他笨嗎?我老板比他笨多了，\n他竟然叫我回家看他有沒有在家..他有行動電話，\n不是嗎，他不會自己打啊!!!』"}, {"id": 6, "title": "某人向他的朋友抱怨說", "content": "某人向他的朋友抱怨說，\n『我的胳臂很痛。我想我應該去看醫生。』\n他的朋友回答，『不要去啦!!藥房裡有台能\n治百病的電腦，比醫生還快又便宜。你只要\n放入你的尿液樣本電腦就會診治出你的病因\n還會告訴你如何處理。只花你十元而已。』\n男人覺得試試也沒什麼壞處，所以他就帶了\n一瓶尿液樣本到西藥房去。\n找到電腦之後，他倒進了尿液樣本然後投了\n十元。電腦開始發出一些噪音不同燈號開始\n閃爍著。停頓了一會兒後掉出了一張小紙條\n上面寫著：\n*你手肘發炎\n*把手浸在溫水裡\n*避免用力工作\n*兩週內會改善\n那天的傍晚他一直想著這不可思議的新科技\n會如何改寫醫藥科學，想著想著就開始好奇\n這個機器是否會被愚弄。\n於是他決定試它一試。他混了一些水龍頭水，\n一點小狗便便的樣本，他老婆和女兒的尿液。\n為了達成混淆視聽的作用，他還加了一點自己\n的精液。然後他回到藥房，投進了10塊錢。\n機器如往常一般的發出了一些聲音然後印出了\n以下的處方簽：\n*你家水龍頭水太硬了\n*換個軟點的水\n*你家的狗有虫\n*給牠吃維他命\n*你女兒在喀藥\n*送她去勒戒所\n*你老婆懷孕\n*小孩不是你的--找律師\n*如果你不停止胡鬧\n*手肘發炎永遠不會好"}, {"id": 7, "title": "一位穿著體面的男士", "content": "一位穿著體面的男士\n到酒吧裡點了一杯馬丁尼，他發覺\n身旁坐著一個外表邋遢一邊唸念有詞\n一邊研究著手中東西的醉漢。\n當醉漢將手中的東西拿到燈光下時，\n這名男子忍不住靠到他身邊去一探究竟，\n醉漢喃喃的說，\n『嗯，它看起來像塑膠。』\n然後他用手指揉搓著，又說，\n『但是感覺起來項是橡膠。』\n好奇地，男子問了，『你拿的是什麼?』\n醉漢回答了，『該死的如果我知道，\n但它看起來像塑膠感覺起來卻像是橡膠。』\n男子接著說，『我可以看看嗎?』\n這名醉漢便把東西拿給他看。\n男子用大拇指與食指翻轉這個東西，\n仔細的研究著。\n『沒錯，它看起來真的像塑膠但觸感\n卻像是橡膠，但我也不知道這是什麼。\n你從那兒拿到這個東西的?』\n醉漢回答，『我鼻孔裡啊!』"}, {"id": 8, "title": "一名男子到歐洲出公差之前", "content": "一名男子到歐洲出公差之前，\n開著勞斯萊斯到倫敦市中心的銀行，\n進去要求預借現金$5000元。\n貸款部服務人員，相對的，要他留下抵押品。\n『嗯，那麼，這是我勞斯萊斯的鑰匙，』\n男子說道。\n貸款部的人員馬上拿著鑰匙把車開到地下室的\n停車中心去保管，接著就拿$5000元給他。\n兩個禮拜以後，男子走進銀行的大門，要求償\n還貸款並把車領回。\n『您預貸的款項為$5000元，加上$15.40元的\n利息，』貸款部的人員解說道。\n這名男子開了張支票後準備離去。\n『先生等等，』貸款部人員說道，\n『在您離開後，我發現您原來是個百萬富豪。\n您怎麼可能會需要向銀行借$5000元?』\n男子微笑道，\n『在曼哈頓有什麼地方可以停兩個禮拜的車子\n卻只收$15.40呢?』"}, {"id": 9, "title": "一個先生和醫生預約門診 他要老婆陪他前去", "content": "一個先生和醫生預約門診，他要老婆陪他前去。\n在醫生仔細檢查過他先生後，醫生對太太說，\n『你先生的病非常嚴重，他需要些特別的治療\n不然的話他可能會死。』\n老婆回答，『怎樣的特別療法?我可以為他做些\n什麼嗎?』\n醫生說：1.每天早上你必須為他準備豐盛的早餐\n然後以快樂的心情送他去上班。\n2.為他準備營養的午餐，當他中午回來後讓他能\n安心地靜養休息。\n3.當他晚上回來時，一頓豐盛的晚餐必須已準備\n好了，而且要是他喜歡吃的菜，絕對不要叫他幫\n你做家事也別對他抱怨或囉嗦任何會令他煩心的事。\n4.保證他在性生活方面能得到充份的滿足，如果\n你能完全遵照這些步驟，那時，你先生就能完全\n康復。\n當先生和老婆開車回家時，先生轉頭問老婆說，\n『關於我的身體檢查，醫生說些什麼?』\n『你快死了。』老婆回答。"}, {"id": 10, "title": "一位男士進入一家餐館並被侍者帶領至餐桌旁", "content": "一位男士進入一家餐館並被侍者帶領至餐桌旁；\n當他坐下時把一支湯匙弄掉到地上，侍者伸進口\n袋掏出另一支湯匙擺在桌上。\n男子問：『你怎會想到將湯匙放在口袋裡？』\n侍者回答：\n『我們有一群管理顧問前來觀察我們工作情況並\n提出改善方案，他們發現有31%的客人會不小心\n將湯匙掉到地上；如果我們帶一支在身上，將節\n省我們走回廚房拿乾淨湯匙的時間。』\n『真是個好主意。』男子說。\n用完餐後，男子起身付帳；當他付帳時注意到侍\n者拉鍊掛著一條線，並與侍者討論。\n侍者解釋這條線的作用為何：\n『顧問們建議我們使用此線來改進我們的工作效\n率，他們建議如果我們在拉鍊掛著一條線，在我\n們方便時，只需拉這條線，然後我們的\"小弟弟\"\n就會出來，這樣子我們的手就不會沾污，能省去\n洗手的時間。』\n『多棒的主意呀！』男子說。\n男子付錢後轉身離開餐廳，當他到達門口時，發\n覺這個主意有一點不對勁；\n他轉身問侍者：\n『你如何將你的\"小弟弟\"弄回褲襠？』\n侍者回答：\n『別人我是不清楚，但我都是用湯匙弄回去。』"}, {"id": 11, "title": "在一個鄉村農場裡住著一對男 女主人及三個兒子", "content": "在一個鄉村農場裡住著一對男、女主人及三個兒子；\n在一個清晨裡女主人醒來，望著窗外牧草原，她發覺\n他們家中僅剩的一頭乳牛橫死在草原上，這絕望的景\n象侵襲著她---她要如何繼續維持家計呢？帶著絕望的\n心，她上弔自盡了。\n當男主人醒來發現妻子去世，如同他家乳牛一樣，他\n也開始看著這毫無希望的景象，於是，他也舉槍自盡。\n大兒子起床後，看到雙親及乳牛死亡，他決定跳河自\n殺；當他到達河邊發覺一條美人魚坐在河堤上。\n美人魚說：『我知道你沮喪的原因，只要你與我連續\n相好五次，我將把一切恢復原狀。』\n大兒子同意嘗試一下，但經四個回合後，他已力不從\n心，於是，美人魚將他溺斃於河裡。\n接著，二兒子醒後發現所發生的事，他也決定要到河\n邊結束他的一生；\n同樣，美人魚對他說：\n『如果你連續與我相好十次，我將歸還你的雙親、哥\n哥及牛。』\n二兒子盡了全力也只打到第七回合，但這還是不能滿\n足美人魚，於是，他跳河自盡。\n小兒子醒來看到他的雙親、乳牛及兩位哥哥都死去，\n深感生命充滿著絕望，於是，他投河自殺；在河裡他\n遇到美人魚，\n這好色的美人魚對他說：\n『我看到整個事件的發生，我可以將一切恢復原狀，\n如果你連續與我相好十五次。』\n小兒子回答：『就這樣？為什麼不二十次？』\n美人魚被這要求震的往後退一下；\n小兒子接著說：『嘿，為什麼不二十五次？』\n正當美人魚不情願要答應他的要求時，\n小兒子又說：『為什麼不三十次？』\n最後，美人魚說：\n『夠了！如果你連續與我相好三十次，我將把每個人\n完好無缺地帶還給你。』\n然後，小兒子說：\n『等一下，我怎麼會知道這三十回合完後，妳會不會\n像那頭乳牛一樣，被我給折騰死了？』"}, {"id": 12, "title": "有位老太太打電話到警察局說", "content": "有位老太太打電話到警察局說：\n『警官，隔壁大樓有位男子裸露身體。』\n警官說：『女士，我們馬上就到。』\n (五分鐘後，這位警官到達現場)\n警官問：『在那裡？女士』\n老太太說：『就在這裡，警官。\n他仍然我行我素，毫無羞恥地裸露著』\n警官問：『到底在那裡？女士。\n我並未看到任何裸體男子』\n老太太說：『你必須使用望遠鏡才能看到他』"}, {"id": 13, "title": "一日 兩位工程系的學生在校園相遇", "content": "一日，兩位工程系的學生在校園相遇；\n第一位叫住另一位並說：\n『嘿！你打那來這麼正點的腳踏車？』\n另一位回答：\n『有一天，我正要走路到教室去，\n有位年輕貌美的女同學正騎著這部\n腳踏車；她跳下車後，脫掉她所有\n的衣服並說:：\"你可以擁有你任何\n想要的東西\"』\n『選的好！』第一位說：\n『她的衣服絕對不適合你。』"}, {"id": 14, "title": "母親一邊在廚房裡工作一邊聽著兒子在客廳裡", "content": "母親一邊在廚房裡工作一邊聽著兒子在客廳裡\n玩新買的電動火車的聲音。\n她聽到火車停下來時兒子說：『你們這些婊子\n養的要下車的雜碎，該死的給我下車，因為這\n是最後一站。而你們這些婊子養的要上車的雜\n碎把你們的屁股移上來因為我們要開車了。』\n母親走到客廳裡告訴兒子，『你怎麼可以用這\n麼粗魯的語言。現在我要你進房間去反省兩個\n小時，當你回來玩火車時，要用禮貌的語言。』\n兩小時過後兒子從房間走出來繼續玩他的火車。\n很快地火車停下來母親聽到兒子說，『所有準\n備下車的旅客請記得攜帶隨身的物品。謝謝您\n搭乘這班火車並祝您有個美好的旅程。 我們期\n待您下次的光臨。』\n『而剛上車的乘客請您把所有的行李放置於座\n位底下。請記得除了俱樂部車廂其他地區皆為\n禁煙區。希望您能與我們共享一個舒適輕鬆的\n旅程。\n『至於那些抱怨火車誤點2個小時的旅客，請找\n廚房那個婊子。』"}, {"id": 15, "title": "有名男人請了一天假 決定去打高爾夫球", "content": "有名男人請了一天假，決定去打高爾夫球。\n他在第二洞時發現有一隻青蛙坐在草叢中。\n他不以為然地準備發球在那同時他聽到。\n『瓜瓜。九號鐵桿。』他看了看那隻青蛙想\n證明那隻青蛙是錯的，於是他把他的球桿放\n在一旁，拿了九號鐵桿。碰!打進了離他十尺\n遠的洞內。他震驚不已。\n他對青蛙說，『哇，太不可思議了。你一定\n是隻幸運的青蛙，是吧?』青蛙回答『瓜瓜。\n幸運的青蛙。』男人決定帶青蛙到下一洞去。\n『你認為如何呢?』男人問。\n『瓜瓜。三號木桿。』男人拿出三號木桿接\n著碰!一桿進洞。這個人高興的不曉得要說什\n麼。在一天即將結束時，男人打了有生以來的\n最高分。\n他問青蛙說『好了接下來去那?』青蛙回答，\n『瓜瓜。拉斯維加斯。』他們到了拉斯維加\n斯後男人問『好了，青蛙，再來呢?』青蛙說，\n『瓜瓜，輪盤。』他們到了輪盤邊，男人問，\n『你認為我該怎麼下注呢?』\n青蛙回答『瓜瓜。$3000，黑桃6』\n現在只有百分之一的機會可以贏，但打完高爾\n夫球後，男人有著無比的信心。碰!好幾噸的錢\n由桌子的另一頭推了過來。\n男人帶著他贏來的錢買下飯店裡最貴的房間。\n他對著青蛙坐下來說『青蛙啊，我不曉得要怎\n麼報答你。你幫我贏了這麼多錢，我會永遠感\n激你的。』青蛙回答，『瓜瓜，親我』\n他想有何不可，既然青蛙為他做了這麼多那麼\n這是他應做的。一吻之後，青蛙變成了一個美\n麗的15歲的小女孩。』\n『事情經過就是這樣，庭上，這就是為什麼這\n個女孩會在我房裡的原因。』男人對法官說。"}, {"id": 16, "title": "女孩邀請男友週五晚上到她家和她父母共進", "content": "女孩邀請男友週五晚上到她家和她父母共進\n晚餐。因為這是一樁大事，所以女孩告訴他\n在晚餐過後，她願意把初夜獻給他。\n男孩欣喜若狂，但他從來沒做過這檔事，所\n以他到藥房去買險套。\n藥劑師幫了男孩一個小時左右。他告訴男孩\n所有有關保險套及性的注意事項。\n結帳時，藥劑師問男孩要買多少個保險套--\n要3袋裝，10袋裝或家庭號。男孩堅持要買家\n庭號因為他認為這是他期待已久的第一次，\n他應該會忙得不得了。\n當晚，男孩出現在女友父母親家在門口碰到\n他的女朋友。\n『哇我等不及要把你介紹給我父母了。快進來。』\n男孩進去後被領到女方父母坐著的餐桌旁。\n很快地男孩要求做晚禱然後把頭低下來。\n一分鐘過去了，男孩還埋首禱告，低著頭。\n10分鐘過去了，男孩還是沒有動作。最後20\n分鐘過去了他還是低著頭，女朋友靠了過去\n在他耳邊小聲說，『我從來不知道你這麼虔誠。』\n男孩子轉頭,小聲的回嘴, 『我也從來不知道\n你爸爸是藥劑師!』"}, {"id": 17, "title": "從前有名男子 他覺得自己罪孽深重 所以他決定到教", "content": "從前有名男子,他覺得自己罪孽深重，所以他決定到教堂去找神父告解。\n當他到教堂時,他走進告解室對神父說。 『神父，我有罪。』\n『是的孩子，告訴我你做了什麼，上帝會釋免你的。』\n『神父，我和女友一直有著親密的關係，這樣已經三年了從沒什麼要緊的事發生。昨天，我\n去她家找她時，只有她妹妹一個人在家，所以我和她妹妹上床了。』\n『這是不對的，孩子，幸運地你得到釋免了。』\n『神父，上個禮拜我到她辦公室去找她，但除了一個她同事沒有其他人在那兒，我也和她的\n同事上床了。』\n『這實在是很不好的行為。』\n『神父,上個月以前,我到她舅舅家去找她,但只有她舅媽一個人在家，所以我又和她上床了?\nC』\n\"......................\"\n『神父? ......... 神父?\" 突然男子發覺神父那邊沒反應,\n他走到神父那邊發覺神父不在那兒..所以他開始尋找神父。\n『神父?你在那裡?』\n他找了又找,終於他在鋼琴底下找到神父。\n『神父,你為什麼躲在那裡呢?』\n『抱歉孩子，我突然發覺這裡只有我一個人 。』"}, {"id": 18, "title": "一位美籍飛機駕駛員在中東被擊落後困於沙漠", "content": "一位美籍飛機駕駛員在中東被擊落後困於沙漠\n中，他嘗試著穿越沙漠找一條回家的路；\n不幸地，被一群野蠻人所俘虜，他被帶到首領\n面前，首領給他二個選擇；一是通過三項考驗\n，二是立即處死。\n顯然地，這位求生意念強的美國人選擇三項考\n驗；於是，首領告訴他必須通過三個帳篷，第\n一個帳篷內有100瓶伏法特加酒，他必須一口氣\n且一滴不漏的喝完全部；第二個帳篷內有一隻\n獅子，它的腳掌插著一支刺，他必須將刺拔除\n；第三個帳篷內有一位性饑渴的女子，從未有\n人滿足過她的性慾，而這位美國大兵必須滿足\n她的慾望；祇要他能夠毫不停頓通過這三個帳\n蓬，他便可重獲自由。\n這美國人深吸一口氣後，向第一個帳篷邁進；\n半小時後，他跌跌撞撞地走向第二個帳篷，不\n久，帳篷內傳來衣服撕裂聲及獅子咆哮聲，一\n小時後，這位士兵遍體鱗傷地出現在首領面前\n，他著急地問：『那第三個手掌有刺的女子帳\n篷在那裡？』"}, {"id": 19, "title": "幾年的婚姻生活以後 有個男人發現他再也不行了", "content": "幾年的婚姻生活以後，有個男人發現他再也不行了。\n他去看了醫生，而醫生用了許多方法可是都沒有用。\n最後醫生告訴他，『這都是你的心理作祟』，然後指\n引一位心理醫生給他。他去複診了幾次，後來心理醫\n生向他坦白『我很遺憾我幫不上你的忙。』最後他介\n紹了一位巫醫給他。\n巫醫說，『我可以把你治好』，他丟了把粉末到火裡，\n然後由火裡昇起了一道藍色的輕煙，.....\n巫醫說，『這股神奇的力量可以讓你恢復但你一年只能\n使用一次!你要做的只是說『123』然後你想要有多長就\n有多長!』\n接著男人問巫醫『那完事之後怎麼做?』\n巫醫說『你只要說『123』它就會縮回來了。但是要注\n意的是一年以內都不能再用了。』\n男人回家的那一晚他準備給老婆一個驚喜....所以，當\n他和老婆躺在床上時他說了『123』時，他馬上就勃起了，\n接著他的老婆轉了過來對他說『你數123是做什麼?』"}, {"id": 20, "title": "很久以前 充斥著英勇騎士的年代 有位勇敢的", "content": "很久以前，充斥著英勇騎士的年代，有位勇敢的\n騎士準備出發東征前召來他的隨從。\n『我要出發去東征了，』他告訴他的隨從說。\n『這把鑰匙是用來開我妻子的貞操帶的，如果在\n十年內，我沒有回來，那麼這把鑰匙就留給你。』\n於是騎士帶全副的武裝踏上泥濘的路程，臨走前\n他看了城堡最後一眼。正準備出發時他看到那位\n隨從從吊橋另一邊跑了過來，大聲叫著他。\n『喔，大人』隨從上氣不接下氣的說。\n『謝天謝地我追上你了。你給的這把鑰匙是錯的。』"}, {"id": 21, "title": "如果你是那些覺得自己有職業倦怠的人之一的話", "content": "如果你是那些覺得自己有職業倦怠的人之一的話，\n聽聽蕭伯納說的話對你會有幫助：\n一年是由365天組成的而每天有24小時，而一天有12\n小時是夜晚的時間，所以要扣掉182天。你剩下183天可以工作。\n扣掉52個星期天，你剩下131天可以工作\n扣掉52個星期六，你剩下79天可以工作。\n然後扣掉每天四小時左右的用餐時間，累積共有60天\n你剩下19天可以工作。\n再扣掉15天的例假日休假，剩下4天可以工作，再扣掉三天的病假或緊急事假，你只剩下一?\n悒i以工作。\n而你絕對別想再錯過這唯一的一天!!!"}, {"id": 22, "title": "某人帶著朋友去探望他的外婆 當他和外婆說話時", "content": "某人帶著朋友去探望他的外婆。當他和外婆說話時，\n他的朋友開始吃著咖啡桌上放的花生，把花生都吃完了。當他們離開時，他的朋友對外婆說\n，『謝謝你的花生。』\n她說，『喔，自從我牙齒掉光後，我就只能吸掉它們外層的巧克力而已。』"}, {"id": 23, "title": "吉米和凱西是新婚的一對在他們蜜月的第一晚", "content": "吉米和凱西是新婚的一對在他們蜜月的第一晚，\n凱西在浴室裡梳洗。\n吉米一邊脫著衣服一邊對著自己說，『我到怎麼\n告訴她呢?我要怎麼告訴我新婚的妻子說我有雙世\n界上最臭的腳呢?』\n然後他把襪子脫了丟到床底下。\n當凱西由浴室內走出來時，太膽怯不敢面對妻子\n的吉米穿過妻子跑到浴室裡去。\n凱西坐在床角對自己說，『我要怎麼告訴他呢?\n我要怎麼告訴我新婚的丈夫說我有張世界上最臭\n的嘴呢?我必須告訴他。』\n就在這時吉米從浴室走了出來。凱西對著他跑過\n去，給了他一個非常熱情的吻，吻完後說，『親\n愛的，我得告訴你一件事。』\n吉米說，『我知道，你剛才吃了我的襪子。?"}, {"id": 24, "title": "某個犯人知道監獄裡的信件都會間先被篩檢", "content": "某個犯人知道監獄裡的信件都會間先被篩檢。\n當他收到老婆寄來有關家中花園的信，信上寫著,\n-『親愛的，我們什麼時候要種馬鈴薯呢?』-\n他回信寫著:『不管在任何情況下，都不能挖開花園\n裡的任何一吋土。我把我所有的槍都埋在那裡。』\n幾天後他老婆回信了，『六個調查員到家裡來。\n他們把後院裡的每一吋土都挖遍了。』\n她收到老公的回信寫著，『現在是種馬鈴薯的時候了。』"}, {"id": 25, "title": "當我去看女兒時 我的孫子問她晚上是否可以開她的車", "content": "當我去看女兒時，我的孫子問她晚上是否可以開她的車出去。\n『可以，』她說，『但是十二點前要把它開回來。』\n『可是，媽，我已經十八歲了。』他抗議著。\n『我知道，』她回答。『但是我的車還沒有。』"}, {"id": 26, "title": "從前有一個人 他非常地喜歡烤豆子 他愛死它們了", "content": "從前有一個人,他非常地喜歡烤豆子.他愛死它們了,\n但是吃完烤豆子之後,往往帶給他非常惱人的副作用.\n有一天他邂逅了一個女孩子並與她墜入愛河.當他們\n論及婚嫁時,他告訴他自己,他如果再繼續吃烤豆子,\n她的老婆一定不能忍受,所以他決定犧牲自己放棄他\n最愛的烤豆子.\n他們結婚不久以後.幾個月後,在他下班回家的路上,\n他的車子拋錨了.他們住在鄉下,所以他打電話告訴\n老婆說因為用走路的會晚點到家.\n在他回家的路上,他路過一家小咖啡廳而由內傳來一\n陣陣令人無法抗拒的烤豆子香味.他考慮了一下反正\n還要走好幾里路才會到家在那之前應該可以排解掉所\n有的副作用.\n所以他就進去點了烤豆子,要走之時他已經吃了三份\n特大號的烤豆子.在回家的路上,他不斷的排氣.所以\n到家的時候他覺得非常地安心.\n他在門口遇到老婆她看起來似乎異常地興奮.她說：\n『親愛的,今晚我要給你一個大驚喜.』老婆用頭巾蒙\n住他的眼睛,把他領到餐桌的主位上,並要他承諾不能\n偷看.\n在這當時他開始覺得又想要排氣.當他老婆正要解開\n頭巾時,電話鈴響了.老婆要他答應在她回來前不能偷\n看後,就離開去接電話了.她離開後,他逮住這個機會.\n他把重心移到另一腳然後解放.\n這不僅是個響屁,還臭得像顆爛雞蛋.他幾乎無法呼吸,\n所以他摸到一條餐巾然後用來搧風.\n他剛開始覺得好點,但另一個屁卻緊接而來.所以他把\n腳抬了起來噗噗噗噗!!聽起來不僅像個柴油發電機,而\n且聞起來更糟.為了避免自己做嘔,所以他用手搧著週\n邊的空氣,希望臭氣能夠消散.\n但另一個屁又緊接而來.這個屁簡直可以得第一特獎,\n窗戶晃動著,桌上的磐子嘎嘎地響,一分鐘後桌上的花\n也謝了.\n他一隻耳朵聽著走廊上的對話,還得守著他的承諾不能\n偷看,接下來的十分鐘,他一直重複著相同的動作,放屁\n再用餐巾搧風.\n當他聽到那一頭講電話的老婆和對方話別時他俐落的把\n餐巾放在腿上然後把手放在上面.滿足的微笑著,在他老\n婆走進來時若無其事的樣子.\n老婆因擔擱了這麼久向他道歉,她詢問他是否有偷看餐\n桌上的東西.確定他不曾偷看後,她把蒙在他頭上的頭巾\n拿掉然後大聲說,『Surprise!!!』\n讓他大驚的是,餐桌旁坐了12位來參加他生日宴會的貴賓。"}, {"id": 27, "title": "一位美麗的金髮女廊正開著新的跑車 飛馳在鄉下的路", "content": "一位美麗的金髮女廊正開著新的跑車,飛馳在鄉下的路上.結果車子拋錨了.幸好離拋錨地點?\n˙楔妊B有個農舍.她走上前去敲敲了那農舍的門.\n農夫出來應門時,她說:『現在已是星期天晚上,我的車在\n這時候拋錨,我不知道該怎麼辦.不知能否在這過一夜.明\n天一早我就去請人來幫忙?』\n『嗯。』農夫懶洋洋地說：『你可以在這過一夜，不過可別和我的兩個兒子傑和路亂來!』\n她往門裡一瞧,真有兩個男子站在農夫的後頭,依她看來這兩個小伙子約二十出頭。『沒問題\n。』她答道。\n等大伙兒都上床就寢後,金髮女郎一直想著隔壁房間的那兩個小伙子,情慾稍動。所以她靜悄\n巧地走進他們的房間說：\n『小伙子呀!要不要讓我來開開你們的眼界,見見世面啊?』\n他們同聲答道：『什麼?』\n她接著說：『只有一個條件,我不想懷孕,所以你們得戴上這些橡皮。』\n金髮女郎幫她他們戴上之後,三個人整晚就沒停下來過。"}, {"id": 28, "title": "40年後 傑和路正做在前廊的搖椅上晃來晃去的", "content": "40年後,傑和路正做在前廊的搖椅上晃來晃去的。\n傑說：『路?』路答：『什麼事，傑？』\n傑說：『你還記不記得40年前,在我們這路過一晚,還幫我們見見世面的那個金髮女郎嗎？』"}, {"id": 29, "title": "有啊 路回答 我還記得", "content": "『有啊。』路回答：『我還記得。』\n『你真的在乎她會不會懷孕嗎？』傑問道。\n『不。』路答道：『我應該不在乎吧!』\n『我也是。』傑說：『那咱們把這玩意兒拿下來吧!?"}, {"id": 30, "title": "這個男子走進酒吧裡 蓬頭亂髮 看起來非常地落魄", "content": "這個男子走進酒吧裡,蓬頭亂髮,看起來非常地落魄.\n他搖搖晃晃地走到吧台前,雙手抱頭,痛苦地坐在那 裡.\n那裡酒保,是個很有同情心的人,他走到男人面前問\n他說:『兄弟,你怎麼了?』\n他回答:『天啊,我剛才發現我的小弟是個同性戀,\n我無法承受這個事實.』\n酒保倒了一杯酒給他並試著要安慰他.但他將酒一口\n喝完,謝過酒保,就搖著頭走了.\n隔天,同一名男子走進這家酒吧,看起來更頹廢失意.\n『發生什麼事了?』酒保問.\n『唉』那個男子說:『你一定不相信.我的二弟竟然\n也是同性戀.這真是晴天霹歷,我不曉得該怎麼辦.』\n『來』酒保嘆了一口氣又倒了一杯酒給他喝,男子將\n酒一口灌下,之後拖著沉重的腳步離去.\n兩天後,這個飽受折磨的男人又來了.他看起來就像個\n走動的殘骸,一邊啜泣一邊喃喃自語的晃到酒吧前.\n『我的老天.』酒保說,『你怎麼了?』『我-我剛才發\n現我的哥哥也是同性戀.我真的不曉得該怎麼辦.』\n『這怎麼可能!』酒保說:『你家難道沒有人喜歡女\n人嗎?』\n這個可憐的人看著他,眼睛紅紅,無奈的說:『我妹妹!』"}, {"id": 31, "title": "幾個人到奧萬大去賞楓", "content": "幾個人到奧萬大去賞楓\n    半路上看到路旁有一個招牌\n        ┌──┐\n        │大小│\n        │  時│\n        │餅候│\n        └──┘\n    「你看那邊有賣『小時候大餅』耶！」\n    「我們去買來吃吃看好不好？」\n    「好啊好啊！」\n    【餅兒買回來了】\n    「奇怪，小時候大餅怎麼會這麼小ㄋㄟ？」\n    「對呀，好小喔....」\n    【回程時又路過同一個地方....】\n    「老闆，你們的大餅怎麼那麼小呀？」\n「大餅？我們賣的是『大餅小時候』啊！」"}, {"id": 32, "title": "爸爸 小明 過幾天就要考試了 我先考考你", "content": "爸爸:小明...過幾天就要考試了..我先考考你...\n        用\"敬佩\"造個句子吧!!!\n   小明:我不知道敬佩是什麼意思....\n   爸爸:那麼\"遙遠\"呢?\n   小明:我不知道遙遠是什麼意思....\n   爸爸:那麼\"計較呢?\n   小明:我不知道計較是什麼意思...\n   爸爸:怎麼搞的...每一個都不會....\n   小明:怎麼不會?我不是每個都給你造出一個句子嗎?"}, {"id": 33, "title": "有人問和尚", "content": "有人問和尚：\n    「你出家那麼久了，現在還會產生那種雜念嗎？」\n  和尚說：\n    「嗯，﹍﹍﹍一個月約有三次﹍﹍﹍」\n  那人說：\n    「一個月只有三次？那很難得啊！」\n  和尚不好意思地摸摸他的光頭說：\n    「﹍﹍可是我每次一起那種念頭﹍﹍大約維持十天﹍﹍﹍」"}, {"id": 34, "title": "有一為認真教學的教受要出國了", "content": "有一為認真教學的教受要出國了..\n  但為不影響學生上課,為他六個助教學生錄了上課內容的錄音帶,  要在上課時播放.\n  後來教受臨時提早回國,於是決定去教室看看大家.\n  一到教室後發現,收音機照常播放,只不過旁邊多了六台小錄音機."}, {"id": 35, "title": "一位神父和修女在沙漠中合騎一匹駱駝 不幸遇到一場", "content": "一位神父和修女在沙漠中合騎一匹駱駝，不幸遇到一場沙暴而迷路，駱駝不久因過於疲勞而\n倒地死亡，兩人站在駝屍旁不知所措，求生的意志也逐漸消失....\n修女說：「Brother，天主要放棄我們了嗎？」\n神父說：「Sister，不可無禮，這是我們快要見到天主的喜訊。」\n修女說：「唉，Brother，不瞞你說，我這幾年來一直未能控制住自己的七情六慾，在生命?\n袢略妨e，我想實現多年來的一個 心願....」\n神父說：「Sister，甚麼心願？我如果能幫忙的話一定幫你實現....」\n修女說：「Brother，我可以跟你『那個』嗎？我想體會一下傳說中 的美妙感覺....」\n神父說：「Sister妳....妳....好吧！莫名奇妙遇到這種浩劫，我也不管那麼多了，我們開\n始吧！」 ....兩人開始寬衣解帶....\n修女驚嘆地說：「Brother，那是甚麼？」\n神父說：「Sister，這是天地間最神奇的『生命之棒』，只要把這東西放在妳體內，就會有\n生命了！」\n修女說：「Brother，你太不夠意思了，有這麼好的東西為甚麼不早說？你趕快把那隻駱駝?\n洉“a！！！」"}, {"id": 36, "title": "磬有魚", "content": "磬有魚\n一日中午，蘇東坡去拜訪一位老和尚。老和尚正忙著作菜，剛把煮好的魚端上桌，就聽到小\n和尚稟報：蘇東坡先生來訪。\n和尚怕把吃魚的秘密暴露，情急生智，把魚扣在一口磬中，便急忙出門迎接客人。兩人同至\n禪房喝茶，蘇東坡喝茶時，聞到陣陣魚香，又見到桌上反扣的磬，心中有數了。因為磬是和\n尚做佛事用的一種打擊樂器，平日都是口朝上，今日反扣著，必有蹊蹺。\n這時，老和尚說：「居士今日光臨，不知有何見教﹖」\n蘇東坡有意開老和尚玩笑，裝著一本正經的樣子說：「在下今日遇到一難題，特來向長老請\n教。」\n老和尚連忙雙手合十說：「阿彌陀佛，豈敢，豈敢。」\n蘇東坡笑了笑說：「今日友人出了一對聯，上聯是『向陽門第春常在』，在下一時對不出下\n聯，望長老賜教。」\n老和尚不知是計，脫口而出：「居士『才高八斗，學富五車』，今日怎麼這健忘，這是一副\n老對聯，下聯是『積善人家慶有餘』。」\n蘇東坡不由得哈哈大笑：「既然長老明示『磬（慶)有魚(餘)』，我就來大飽口福吧！」"}, {"id": 37, "title": "乙女 甲生 你能不能借我一片cd", "content": "乙女:甲生..你能不能借我一片cd...\n甲生:好呀...你說吧..\n乙女:說..你愛我...\n甲生:什麼..你再說一次...\n乙女:說..你愛我...\n甲生:我愛你.....\n此時全辦公室的同事..全都笑倒在地,,,,\n甲生的臉......紅的..................\n呵.....你看懂這鍋笑話了嗎..."}, {"id": 38, "title": "有次我跟某大學的山社一塊去爬山", "content": "有次我跟某大學的山社一塊去爬山.............\n一路上有位同伴的談吐讓一位女士覺得有些不雅...\n因為他老是說....\"幹!!這裡好漂亮!!\"\n\"幹!!我快不行了!!\"\n\"幹!!這裡的風景有點像是在玉山!\"\n\"幹!!XXXX!!\"\n\"幹!!.........\"\n結果那位女士終於受不了!!便斥責他說.....\n\"喂!!難到你們山社的都那麼粗魯嗎?\"\n那男的不加思索便說.......\n\"幹!!哪有啊??\"\n之後, 那女的就敗給他了, 而我笑到使得對伍不得佔為我\n暫時休息........."}, {"id": 39, "title": "講話粗魯的小明 在上國文課的時後想要", "content": "講話粗魯的小明,在上國文課的時後想要\n上廁所,他舉手跟老師說......\n小明: 老師,我要大便!\n老師: 真是的....平常我是怎麼跟你們講的,講話\n要文雅一點,你竟然.....不准去!等你想到\n文雅一點的話再去吧!\n小明左思右想,就是想不到文雅的句子,他又很急,最後,\n他又舉手了......\n小明: 老師.....我....我...我屁股想吐!\n全班昏倒!!......."}, {"id": 40, "title": "今年暑假", "content": "今年暑假...\n我到醫院實習....\n發生了一件很誇張的事....\n我們學校有間教學醫院....\n醫院外頭鄭在修馬路...\n所以坑坑洞洞的...\n都是砂子跟十頭....\n某天.....\n路人甲行經此地....\n砂子跑到鞋鞋裡面了....\n所以...就站在路旁的電火條旁邊....\n[電火條謂之...電線桿...]\n右手扶著電火條....\n一邊斗腳.....\n試圖將腳腳裡的砂子抖出來...\n抖的抖著...\n後頭來了郭路人乙.....\n路人乙以為路人甲觸電了...\n就急忙撿起路邊的一隻大棒子...\n要救路人甲....\n於是將棒子用力的往甲的右手...\n狠狠的敲下企....\n就降子....\n甲因為右手骨折....\n送到我們醫院來急救...."}, {"id": 41, "title": "話說成大勝八宿舍前 十八相送 離情依依", "content": "話說成大勝八宿舍前 十八相送 離情依依\n時間又接近十一點半啦 一男一女緊緊擁抱 難割難捨\n剩五分鐘 剩四分鐘............... 再忠貞的愛情\n也無法阻止宿舍的關門 兩隻緊握的雙手終於被分開啦\n在女生踏進宿舍的第一步時 男孩鼓起勇氣大聲說 \"\n我.. 還.. 有.. 三.. 個.. 字.. 沒.. 跟.. 妳.. 說 \"\n全勝八舍 勝一舍 勝九舍 的男男女女都探頭出來啦\n勝八門前依依不捨的情侶 包括警衛先生 全都秉氣凝神\n等待那人類史上 最感人肺府 深叩人心的三個字\n一切喧雜都忽化為沉靜 只見那男的大聲說\n\" 早......點.......睡 \"\n(真人真事改編而成)"}, {"id": 42, "title": "某一次出隊 到一個偏遠的鄉鎮", "content": "某一次出隊，到一個偏遠的鄉鎮，\n在一堂活動中：\n活動長：好，現在所有的小朋友將你的麥當勞離開\n地球表面．．．．\n兒童甲：哇！原來小屁屁叫做麥當勞哇！\n兒童乙：哇！好好玩哦！\n休息時間，小朋友在外面玩，服務員在室內稍作休息，只聽．．\n兒童甲：我要打你的麥當勞．．．\n兒童乙：不要給你打．．．\n兒童甲：我偏要打．．．\n兒童乙：在打，我要打你薯條哦．．．\n服務員：唉呦！現在的小朋友怎麼那麼色啊！\n然後一大群服務員衝出室外，只見．．．\n兒童乙抓著兒童甲的手拼命猛打．．．．\n兒童乙：我打你的薯條．．我打你的薯條．．．\n服務員：．．．．．．．"}, {"id": 43, "title": "話說在一臺飛機上 有一位白人媽媽在餵小babyㄋ", "content": "話說在一臺飛機上,有一位白人媽媽在餵小babyㄋㄟㄋㄟ,\n小baby正吸著一臉幸福美滿的時候,鄰座也有一位黑人\n媽媽在餵babyㄋㄟㄋㄟ,白baby見狀,放聲大哭....\n白媽媽問:怎麼啦?\nbaby邊哭邊指著鄰座說:哇....媽媽,我也要喝巧克力的...."}, {"id": 44, "title": "元旦假期我同學回台北 假期中有天他騎車在市區四處", "content": "元旦假期我同學回台北,假期中有天他騎車在市區四處閒晃,\n在一處停紅綠燈時,瞥見一個中年男子騎著機車載著他的小孩,\n孩子趴在爸爸身上睡覺,那個爸爸就趴在機車龍頭上睡,\n綠燈了,爸爸就起來繼續騎機車前進,結果後面的小孩摔了下來,\n但那個爸爸仍是渾然不覺,繼續前進,那個小孩摔下來後,\n揉了揉摔傷的手,又趴在馬路上繼續睡,我同學看了不忍心\n就把他抱了上車去追他爸爸,終於在下一個紅綠燈處追到了,\n在叫醒他爸爸後,說明原因,他爸爸除了向我同學致謝外,\n並說是因為從台南一路騎到台北沒有休息,所以遇到紅燈就小憩一下,\n那個爸爸把他兒子安頓在後座好了之後,突然問了他兒子一句,\n「你老母咧？」 .............."}, {"id": 45, "title": "有天我那鍋同學", "content": "有天我那鍋同學.......\n他啦...在路上啦.....突然看到一個人\n然後啊....他覺得那個人好熟悉喔........\n走進些...確定些.....\n就大喊:二伯..二伯........\n#$@%$#@%^.......奇怪那人怎麼沒反應.....\n不死心..繼續大喊.......『二.......伯.....』(用台語念)\n終於他有反應了.....\n回頭.......\n我同學一看......\n天啊...!!!認錯人了.........\n只見同學從容的說:28..29..30...31.............(用台語念)"}, {"id": 46, "title": "有一天 寶寶想要買一隻鸚鵡 於是便到鳥店去看 他", "content": "有一天,寶寶想要買一隻鸚鵡,於是便到鳥店去看.他看上一隻,\n便問老板 寶寶:老板,這隻要多少錢? 老板:這隻啊!精通國語,\n要10000元 寶寶:好貴哦!那旁邊那隻呢? 老板:那隻精通英語,\n要50000元 寶寶:哇!那後面那隻呢? 老板:哦!那隻精通六國語言,\n要300000元 寶寶:唉!我沒這麼多錢 老板:那角落那隻只要2000,\n可是它只會說\"是誰人\"(台語) 寶寶:沒關係,我要這隻,我自己教它\n於是寶寶就把那隻鸚鵡買回家了.回家後,寶寶每天都教它,\n可是它就是學不會 有一天,寶寶有事出去了,不巧,修水電的來了...\n(以下對話請用台語) 叮咚!叮咚! 鸚鵡:是誰人? 水電:修水電的\n修水電的等了很久都沒人,於是又按鈴 叮咚!叮咚! 鸚鵡:是誰人?\n水電:修水電的啦! 修水電的又等了許久,都沒人,於是他就很生氣的又按鈴 叮咚!叮咚!\n鸚鵡:是誰人? 水電:xxx,修水電的啦!\n但是鸚鵡仍是\"是誰人\"的一直問,那水電的氣到暈倒 寶寶回來時,天色已黑,看不清楚,就踢?\n鼒w倒的水電的,於是驚叫一聲\n寶寶:是誰人? 鸚鵡:xxx,修水電的啦!"}, {"id": 47, "title": "以前 有一個同學 看上了一個舞蹈系的漂亮女孩 但", "content": "以前，有一個同學，看上了一個舞蹈系的漂亮女孩，但是卻不知道她的名字，也一直苦惱沒\n有什麼機會和她接觸、搭訕。\n有一次，機會終於來了，因為這個同學看到那漂亮女孩走進一家牛肉麵店，所以就趕快踉著\n進去。 男同學眼睛直盯著女孩，心中怦怦跳，因想和這女孩講話、搭訕，又不知道說什麼?\nn，只好問她的名字好了。\n這男同學有點緊張地向女孩開口問道： 請問妳叫什麼?\n那漂亮的女孩很納悶地抬頭看著他，說：我叫牛肉麵啊；\n噢；這男同學紅著臉，噢了一聲，只好改口說：這樣子噢!那我叫陽春麵!"}, {"id": 48, "title": "有一對年輕夫妻吵了一晚上的架 臨睡前 兩人仍然氣", "content": "有一對年輕夫妻吵了一晚上的架，臨睡前，兩人仍然氣呼呼的，\n都認為對方了莫名其妙不可理喻，而不願主動開口說話。關燈睡覺前，老公用筆寫了一張紙\n條，遞給他身邊的太太，上面寫著；\n明天早上六點半，把我叫醒! 老公於是開始呼呼大睡。\n隔天早上，老公猛然醒來，驚慌發現，已經陽光曬屁股、七點半了。完了，完了，上班遲到\n了!咦?太太呢?真是他媽的，叫她叫醒我，她居然不理，自己先起床上班去.這老公在急急忙\n忙穿衣服、打領帶時，突然發現自己床頭上留有一張紙條，\n上面寫著： 死豬，六點半了，趕快起床!"}, {"id": 49, "title": "另有一位美國交通警察攔下一輛由老太太開的車子 臉", "content": "另有一位美國交通警察攔下一輛由老太太開的車子，臉色不悅地責問她：妳怎麼亂打手勢??\np本來是伸出左手，打手勢要左轉，後來怎麼搞的，又左手 上下揮一揮，然後突然又右轉??\n蝏禰i以這樣亂打手勢、亂轉彎?這是很危險的，知不知道?\n對不起啦，警察先生!老太太很不好意思地說：我本來是要左轉，所以伸出左手，打左轉手?\n捸G可是後來我突然想起，我記錯了，我應該是要右轉才對，所以又趕快伸出左手，把我原?\n揪漱漍桹O號擦掉，然後再趕快右轉!"}, {"id": 50, "title": "有一天 當擁擠的東京地鐵快速前進時 一名男乘客突", "content": "有一天，當擁擠的東京地鐵快速前進時，一名男乘客突然發覺，有一隻手慢慢地伸入他的褲\n袋裡：這男乘客動作矯捷如兔，一下子就把那隻手抓住了!當他轉過頭來一看，原來是一名?\n~輕美麗的妙齡女郎。\n哈，妳竟然這麼膽大包天，敢在太歲爺頭上動土!男乘客很得意地說：妳也不打聽清楚，我?\nO全東京最機靈,最有名的扒手老大，妳真是有眼不識泰山啊!\n真的啊?對不起!我剛從大阪過來，想來這裡多學習、學習，真是對不起啊!不過，我在大阪?\n]是最有名最優秀的扒手大姊今天我真是走運，可以向您多加討教討教!這女郎客氣地對男乘\n客認錯賠罪。\n正因這巧合機緣，扒手男女就彼此認識了!從此以後，兩人開始一交換心得，切磋技藝，也?\no生了亦師亦友的感情。不久之後，他們就結婚了。\n過了一年，愛情結晶一個自白胖胖、五官端正，十分清秀可愛的兒子出生了。\n哇!真是個漂亮可人的小嬰兒!也真的讓扒手爸媽疼愛死了。\n可是，這剛出生兒子的右小手始終一緊緊握著，一直打不開。 為什麼呢.這對父母找了許多\n醫生來檢查，都說小男嬰非常健康，小手的肌肉也十分正常：\n但是，小男嬰的右手就是緊握著，張不開來。\n後來，扒手父母一請來一位心理醫師，看看小兒子是不是心理有問題?這位大夫把小男嬰全?\n郊J細檢查一遍後，還是覺得小男嬰很正常。不過，大夫思考了一下，從左手腕上拿下滿天?\nP的金錶，在小男嬰的跟前搖來晃去!\n說來真是奇怪，奇蹟發生了小男嬰看見滿天星金錶後，眼睛為之大亮，而他的右小手也想伸\n出來抓住金錶。慢慢的，小男嬰的右拳頭張開了，小小手心裡竟然握著一個接生婆的結婚戒\n指!"}, {"id": 51, "title": "有一個女孩子到鄉下去拜訪朋友 但是逗留太久", "content": "有一個女孩子到鄉下去拜訪朋友，但是逗留太久，\n最後只好趕搭晚上末班十點的公共汽車回家。\n當這個女孩子到達候車亭時，大約是晚上九點四十五分，\n她想，公車應該還沒經過才是。所以，女孩就開始等呀等。 可是，等到了十點，公車怎麼?\n暀ㄗ?是誤點了嗎? 鄉下的車子很少，在漆黑的晚上、四周靜悄悄，只有這女孩一人在微弱\n燈光的候車一早中等待公車：女孩心裡開始有些害怕怎麼公車還不來?\n到了十點十五分，奇怪?公車怎會誤點這麼厲害?或是公車已經在九點四十五分之前，就提早\n開走了?女孩愈想愈毛骨悚然，但也只有告訴自己：\n別怕，或許公車開慢了些，再等一會兒，一定會來!\n這女孩鼓起勇氣，一個人在候車亭裡繼續等!等!等；\n到了十點三十五分 終於 終於 公車的燈光出現了!最後一班公車終於來了!\n可是……怎麼公車開那麼慢?開得慢吞吞的?女孩心裡突然感到一陣不祥與不安!\n管它的!反正公車來了就好!女孩再次鎮定地告訴自己；\n別想那麼多了，有公車坐回家就好了\n此時，公車慢慢地開到候車亭之前，咦?公車門怎麼是開的?而公車也沒有停下來，只是繼續\n緩緩地前進。女孩就壯起膽子，跳上公車去!女孩跳上公車後，左看、右看，奇怪?怎麼連一\n個乘客也沒有?再仔細一看，咦?怎麼也沒有l，司機和車掌 ?可是……可是車子明明還一直?\n鼠e開呀…\n這下子，女孩真是嚇得全身發毛，臉色鐵青，一看情況不對，\n馬上決定趕緊跳下車去… 這女孩跳下公車、驚魂未定時，\n看著車子居然還緩慢地往前走：當車子走過女孩的視線時，\n女孩突然發現司機和車掌，兩人汗流浹背.正使盡吃奶的力量，\n一起在車子後面用力地推著拋錨的公車!"}, {"id": 52, "title": "聽說 有三兄弟 …大毛 二毛 小毛 住在五十層的", "content": "聽說，有三兄弟 …大毛、二毛、小毛，住在五十層的摩天大樓上，\n他們每天都一起搭一快速電梯回到五十樓的住處\n有一天，當地們開車回家，將車子停放在地下室後，赫然發現大樓停電，於是，三兄弟只好\n一層一層地爬樓梯回家。 為了排遣寂寞和無聊，三兄弟就決定輪流說一則悲慘故事，看誰?\n〞漪G事最悲慘、最痛苦，誰就可以得到冠軍：\n大毛先說，他朋友的女朋友是多麼乖巧、可愛，又很上進，但是有一天和一群好友到餐廳吃\n飯，沒想到卻被突來的大火吞噬、活活燒死，屍體變成一團焦黑……。\n說著說著，三兄弟不如不覺已經爬到二十樓了。 於是，二毛緊接著說，報上登載，有一個?\nk人遇人不淑，遭到殘暴丈夫的百般虐待、毒打，全身傷痕纍纍，而三歲小女兒，也被生父?\nh打得無法走路……二毛說的故事，正是前幾天報上登的社會新聞，聽得大毛、小毛都悲憤?\nㄓw：\n此時，三人已氣喘喘地爬到了四十八層。\n輪到小毛說故事時，小毛很沮喪地說：我實在沒有什麼悲慘故事好說，可是，我忽然想起，\n我把家裡的鑰匙放在地下室的車子裡，忘了帶出來了!結果，三兄弟很不情願、很痛苦地走?\n^地下車庫拿鑰匙：三人再很傷心、很痛不欲生地爬回五十層樓家中。當然，小毛榮獲說悲?\nG故事比賽己的?\na軍。"}, {"id": 53, "title": "有個母親和她的小孩有這麼一段對話", "content": "有個母親和她的小孩有這麼一段對話\n母:小明,你快樂嗎?\n子:快----------樂!(小孩很大聲並拉長著音回答.)\n母:你高興嗎?\n子:高----------興!\n母:你幸福嗎?\n子:不幸福!(小孩聲音跟著變小了)\n此時母親嚇了一跳,心想怎麼回事,正納悶著\n突然小孩說話了:我姓柯啊!!"}, {"id": 54, "title": "上次在WWW也看到一個類似的", "content": "上次在WWW也看到一個類似的\n客人打電話來詢問: 我的電腦壞掉了 請派人來修理\n工程師: 是什麼地方壞了 請大致說一下\n客人: 就是那個電腦上 放茶杯的地方\n工程師狐疑的問: 放茶杯？您大概是新的機種吧？能不能說一下什麼樣子\n客人: 就是中間有個圓盤 茶杯放進去正好可以卡住啊 很好用的\n工程師: 這樣唷 還是不太了解 能不能請教這個茶杯盤的廠牌\n客人: 不知道耶 上面有寫個 4X 不知道是不是你問的廠牌"}, {"id": 55, "title": "有天在某一個休息站 小美跟店員買了一個重量杯(重", "content": "有天在某一個休息站,小美跟店員買了一個重量杯(重量杯是先買杯子,再去裝飲料)之後小美\n就從容不迫的走到飲料機的前面用重量杯的杯子,努力的用力的裝了滿滿的一杯熱咖啡,此時\n卻看到店員已在一旁昏倒了"}, {"id": 56, "title": "一天 有個人去逛動物園 走啊走 走到 猴園 的時", "content": "一天 有個人去逛動物園 走啊走 走到\"猴園\"的時候 便高興的向\n猴子們揮揮手示好 結果猴子們 拿香焦皮 小石頭 丟他\n丟的他哇哇叫 於是 他問那個在旁邊洗大象的阿伯\n阿伯便說:猴子的文法跟我們人類不一樣 你剛才對他揮手 代表\n你罵它\"你是神經病\"! 你要對它搖屁股 才表示示好\n後來 他逛完了動物園 又走到\"猴園\" 想驗證阿伯剛剛說的話\n他真的對猴子搖屁股\n結果 猴子們對他 .....揮揮手"}, {"id": 57, "title": "在農曆七月的時節 計程車司機們總是害怕在深夜兜生", "content": "在農曆七月的時節, 計程車司機們總是害怕在深夜兜生意。不過為了養家糊口, 老王還是只\n好硬著頭皮半夜仍繼續努力載客賺錢。在一個子夜時分載到了一位單身女郎,女郎肩披長髮?\nB身著白衣、看起來詭異詭異的。雖然心裏毛毛的, 不過想到這深夜中荒郊外,\n車也難招。好心的老王遂停車載客：\n『小姐要去那裏? 』\n『請到木柵. 』\n中途老王均不時的用照後鏡看看這位女郎、只見女郎一言不發的靜坐在後老王著實心中好不\n自在。\n途中開到了最不乾淨的辛亥隧道時, 老王更是不停的用照後鏡看女朗的舉動不料此時鏡中卻\n不見女郎的身影, 老王這下心可慌了, 趕緊回頭看看後座只見女郎一樣靜坐如前,老王心想?\ni能是自己太累了, 一時眼花, 於是又轉回頭來開車開到隧道中途, 老王忍不住又看了一下?\n茷愨?\n沒想到女郎又不見了,而且後座還傳來奇怪的聲音, 老王趕緊回頭一看, 女郎依舊端坐如前.\n老王這可心慌了, 趕緊用那顫抖的腳猛踩油門, 心裏只想趕緊走出這隧道....\n可是老王還是又忍不住看了一下照後鏡, 結果女郎又不見了!\n老王於是猛踩煞車, 準備回頭好好檢視後座豈料老王一回頭, 只見女朗的頭從下面慢慢升起\n, 滿臉是血, 還面帶怨色....\n老王忍不住大叫: 『不關我的事! 不關我的事! 不要找我! 』\n這當老王準備奪門而出時, 女郎開口了....\n『司機先生, 怎麼會不關你的事....\n我只是因為忍不住鼻子癢, 所以躲在椅背後面偷挖鼻孔, 不好意思讓你看見,所以只敢在你?\n}車時偷偷挖, 你一回頭我就趕緊坐好,\n那曉得你忽然緊急煞車, 害我挖得太大力, 結果挖到流鼻血,\n怎麼會不關你的事!!!!』"}, {"id": 58, "title": "男 我好喜歡你喔 我真的很喜歡你 我可不可以親親", "content": "男：我好喜歡你喔...我真的很喜歡你...我可不可以親親你？..\n女：不要臉....\n男：那我親嘴好了...."}, {"id": 59, "title": "考試時---", "content": "考試時---\nA:喂!前五題答案是AAAAA.\nB:是嗎?我寫的是BCDCE耶.\nA:謝謝!"}, {"id": 60, "title": "一位顧客慢條斯里的在餐廳中用餐 然後他吃水果 抽", "content": "一位顧客慢條斯里的在餐廳中用餐，然後他吃水果，抽香煙。\n當侍者把帳單送上時，他摸了摸口袋，假裝驚慌失措的說：\n「糟糕，我的錢包不見了。」侍者面無表情的問：「真的嗎？」於是，他把這個男人帶到門\n口，大聲命令他：「蹲下。」然後用力一腳，把他踢到門外。\n這時，坐在另一張桌上的一個顧客，自動的走到門口，同樣的\n蹲下來，然後回頭對侍者說：「結帳。」"}, {"id": 61, "title": "這是一則真人真事", "content": "這是一則真人真事\n是某位有名的數學家(名字我忘了)的真實事蹟......\n這位數學家在他攻讀博士學位時,在入學的第一天, 指導教授照例要和學生談話,可是那一天\n他因故遲到.等到他到時, 早已人去樓空...\n只剩下黑板上的幾道\"習題\"\n他心想:\"哇靠, 怎麼老師第一天就派習題給學生做....\"\n於是乎, 他就將黑板上的題目抄下來.......\n一個星期後, 他將習題的答案寫下來, 交給指導教授.......\n過不久, 他的指導教授將他找來, 說:\"你可以拿到博士學位了, 至於你的証明, 我已經幫你\n寫好, 投到期刊上了.\"\n他當時還不知道究竟發生了什麼事......\n後來才知道, 原來那幾道題目不是派給他們的習題,\n而是當時指導教授和學生談話時, 在黑板上寫了幾道題目, 說:\n\"幾道題目是目前懸宕已久, 而且尚未解決的數學問題,\n如果你們有心, 可以將其中之一當成你未來幾年攻讀博士學位的研究題目.....\"\n後來, 當他的指導教授看到桌上的紙中竟然寫著這些問題的証明,\n不禁感到驚呀, 說這到底是誰解決了這些問題.\n看了看扉頁的名字, 想了許久, 才知道這是他的學生.......\n高興之餘, 就幫他將証明投到期刊上.....\n同時, 這個事蹟也開始流傳開來, 成為眾多數學家的英勇事蹟之一....."}, {"id": 62, "title": "有一個剛結婚的小姐 生性害羞 因此當他獨自在家時", "content": "有一個剛結婚的小姐，生性害羞，因此當他獨自在家時，\n總是不敢應門，生怕遇到壞人被欺負了。\n某日，收報費的先生來她家收報費，剛好她先生不在家，\n所以她也是不敢開門，但那位先生不斷地按門鈴，她又不知\n道該如何應對，情急之下，就想出一計，就是學狗叫，\n於是她就不斷地由裡頭往外叫，希望收報費的先生能以為家裡沒人。經過一陣子之後，那位\n先生果然走了，她也才鬆了一口氣。\n隔日晚上，收報費的又來了，按完門鈴之後，是她先生來應的門.......\n先生：你不是應該昨天就來收報費的嗎？怎麼.....\n收費員：我昨天是來過了啊，可是你太太一直學狗對我叫，不拿錢出來，我有什麼辦法....\n........."}, {"id": 63, "title": "有某一國總統為了提高自己的聲望 決定發行一種上面", "content": "有某一國總統為了提高自己的聲望,決定發行一種上面印有自己的臉的郵票,發行了一個多月\n後,總統決定到郵局查看銷售情形.....\n總統:銷售情形怎樣啊????\n員工:還不錯...只不過有人常常抱怨貼不牢....\n總統:怎麼會呢???\n語畢,總統順手抄起了一張郵票,在背面吐了一口口水,用力黏在一張紙上...\n總統:你看這不是貼的很牢嗎?!?!?\n員工:可是....大家都...大家都..把口水..吐在正面......"}, {"id": 64, "title": "某日 在一部擁擠的公車上 一對男女拉著吊環站著", "content": "某日，在一部擁擠的公車上，一對男女拉著吊環站著。\n女孩對男孩說：『噯！你幫人家ㄎㄡ一下屁股好不好？』\n剎那間，公車內的空氣彷彿凝結一般， 那男子面有難色的回答：\n『不方便吧？人這麼多！』\n女還嬌嗲說：『我不管，趕快幫人家ㄎㄡ一下屁股嘛！』\n此時，整部公車的人都注視在那男子身上。\n只見他滿臉通紅地拿出大哥大撥了號碼：\n『喂！屁股嗎？我馬子要我ㄎㄡ你！！』"}, {"id": 65, "title": "有一個女的跟一個男的約會 那天很冷 女的故意沒穿", "content": "有一個女的跟一個男的約會. 那天很冷, 女的故意沒穿外套,\n想要給男的有表現的機會.\n女:[今天好冷哦! 我忘了穿外套了.] (滿心期待)\n男(拉緊衣服):[還好還好, 我有記得穿, 否則真的會跟妳一樣, 冷死了.](露出滿足的笑容)"}, {"id": 66, "title": "女 [ ]", "content": "女:[.....]"}, {"id": 67, "title": "在一個月黑風高的夜晚 一隻吸血蝙蝠全身沾滿了血飛", "content": "在一個月黑風高的夜晚，一隻吸血蝙蝠全身沾滿了血飛了回來，洞裡的同伴覺得很好奇，就\n問它到底是去哪裡吸血，怎麼會有這麼多血呢？蝙蝠本來不想回答的，可是同伴卻問個不停\n，它最後煩得受不了了，它就說：『你們想知道嗎？跟我來吧』飛．飛．飛，蝙蝠就飛到一\n棵樹的前面，然\n後它就問：『你們有看到前面那一棵樹嗎？』在場的同伴都回答有，然後蝙蝠就說：『她媽\n的，我剛剛就是沒有看到那棵樹！』"}, {"id": 68, "title": "游泳池中", "content": "游泳池中....\n救生員: 先生, 請你不要在泳池中小便好嗎?\n某先生: 在游泳池中小便的人這麼多, 你為什麼只抓我?\n救生員: 可是只有你站在跳板上啊!"}, {"id": 69, "title": "有一個媽媽 她有一個長的非常醜有很黑的小孩", "content": "有一個媽媽，她有一個長的非常醜有很黑的小孩，\n一天婦人帶著小孩去坐火車，一個歐巴桑經過她\n座位旁時，看見了這個小孩，忍不住搖搖頭輕聲\n說句\"唉！怎麼有這麼醜的小孩！\"，婦人聽了\n以後忍不住哭了出來，不知情的列車服務小姐\n看到婦人不知為何哭得如此傷心，於是想安慰\n婦人便拿一隻香蕉對婦人說\"妳不要在難過了\n，來，這裡有隻香蕉，給妳的猴子吃吧！\""}, {"id": 70, "title": "一位老先生要養寵物 於是便到寵物店告訴店員說", "content": "一位老先生要養寵物,於是便到寵物店告訴店員說:\n給我一隻特別的寵物.....店員便帶老先生到店後面,有一隻大北極熊,老先生很高興便決定?\nR下來.店員最後警告老先生說:你什麼都可以作,就是不要摸牠的鼻子.幾天後,老先生在實在\n忍不住了,便偷偷摸了一下牠的鼻子,這時,北極熊 \"口孔 ....\"的一聲.\n突然用後腳直立起來,舞著巨掌,開始追著老先生.老先生於是拔腿就跑,飛也似的逃命.終於,\n不幸的被逼到角落.此時,北極熊緩緩的靠近.伸出手掌,摸了一下老先生的鼻子說:\n現在輪到你捉我了"}, {"id": 71, "title": "大學裏的共通科目 總有三四百人一起上課 秩序不好", "content": "大學裏的共通科目..總有三四百人一起上課...秩序不好維持...\n教授為了管理方便..報告都要求上課前交到講桌上..教授一開講\n就算遲交..而遲交是不計分的.\n某日上課..教授正講得天花亂墜..忽見一位學生破門而入..手拿\n著剛趕出來的報告...大搖大擺的走到講桌前..頓時所有學生的\n注意力都轉移到這為仁兄身上..\n就在他準備把報告放到作業堆裏時...教授說話了..「這位同學\n你遲到也就算了..還打斷我講課..是很不禮貌的行為, 而且\n報告在半小時前就不收了」我們可以感到那教授為了表現他的\n修養...已經把話說的很客氣了...\n誰知那小子竟然提高了嗓子說「嗯..那你知道我是誰嗎???」全班\n一陣騷動...教授也怔了一怔說 「實在抱歉..一班的學生都三四百\n人.. 我又不只教一班..我真的不知到你是誰...」\n那小子喜出望外..把他的報告往那一疊厚厚的作業堆中一塞..一溜\n煙的消失在門外.......\n真是...智勇雙全....."}, {"id": 72, "title": "大明剛剛結婚不久 某夜 老婆正在廚房忙著晚餐", "content": "大明剛剛結婚不久。某夜，老婆正在廚房忙著晚餐。\n大明為了體貼老婆，想幫老婆做點家事。\n於是就對親愛的老婆說：老婆，我能幫忙什麼嗎?\n老婆說：看你笨手笨腳的，找點簡單的，就剝洋蔥好了。\n大明想這個簡單不過了。不過剛剝不久， 大明就被嗆得一把鼻涕一把淚。心想，這可不是?\n獄臕眾獢A又不好意思去向老婆請教，\n只好打電話向老媽討救兵。 老媽說：這很容易嘛，你在水中剝不就得了。大明於是按著老?\n漱隤k，完成了老婆的任務， 開心的不得了。隔天，大明打電話向老媽說： 老媽，妳的?\n隤k真不賴，不過好雖好，美中不足的就是要時常換氣，好累人又喔。"}, {"id": 73, "title": "兩個德國人站在紐約街口聊天 說義大利人最討厭 說", "content": "兩個德國人站在紐約街口聊天，說義大利人最討厭，說話太吵雜、\n貧窮、沒有教養等等。正說的熱鬧，街道另一頭來了一位義大利人，帶著一隻小猴子，很明\n顯的是個街頭賣藝的。這兩位德國人中的一位很快的走過去，在小猴子手中的罐子裡扔下幾\n個銅板。他的朋友大惑不解的問他：你不是才在說你很討厭義大利人嗎？」\n是啊!他說：「可是他們小的時候實在是很可愛 !」\n日期:某年某月的某一天\n地點:某個地方\n角色:蝙蝠甲乙丙\n甲:嗚!嗚!最近都找不到血....偶快要餓死了!\n乙:白癡!去醫院偷一包血來喝阿!\n丙:那多麻煩阿!....\n去廁所拿一包來泡就可以了嘛!"}, {"id": 74, "title": "兄弟兩人吵嘴罵架", "content": "兄弟兩人吵嘴罵架。\n哥哥指著弟弟的鼻子罵：「你媽的！」\n弟弟也指著哥哥的鼻子罵：「你媽的！」\n父親從房裡怒氣沖沖地跑出來，在兩個兒子臉上各賞了一個耳光\n．邊打邊訓斥：「你媽是他媽．他媽是你媽，做兒子的能罵媽媽\n嗎？嗯．他奶奶的，真不像話！」........"}, {"id": 75, "title": "話說古時有一超級健忘男子 騎著馬 帶著弓箭出外行", "content": "話說古時有一超級健忘男子，騎著馬、帶著弓箭出外行獵。\n忽覺腹痛，想撇大條。就把馬綁在樹旁、把弓箭插在地上，躲到草叢方便去了。等他方便完\n出來，看到插在地上的箭，吃了一驚說：「居然有人放冷箭！幸好沒射到我。」接著看到綁\n在樹旁的馬，笑著說 ：「居然有人笨到把馬丟在這裡，哈，不牽白不牽。」\n待他牽馬過草叢時，不小心踩到自己拉的屎，氣極敗壞的罵道：「是那個不要臉的傢伙，居\n然在這裡拉屎！」"}, {"id": 76, "title": "兩輛車子發生擦撞 車主都下來看 甲車主看了一下車", "content": "兩輛車子發生擦撞，車主都下來看。甲車主看了一下車子，說：「幸好我們安然無羌，車子\n並沒有什麼損失。老兄！要不喝一口酒壓壓驚？」並遞上一瓶酒。\n乙車主欣然地接了下來，喝了幾口。問甲車主說：「你要不要來一點？」\n甲車主說：「好，等警察來了以後我再喝。」"}, {"id": 77, "title": "一日期中考 所有題目都是選擇題所以甲生就帶了一個", "content": "一日期中考，所有題目都是選擇題所以甲生就帶了一個骰子去。\n乙生坐在他旁邊。\n以下是考試情形：\n甲生丟骰子：\"3.1.3.4.2.4.2.1\"然後甲生就寫完了，開始睡覺。\n不久甲生起來了，又開始丟骰子......\n乙：「你在幹嘛？」\n甲：「驗算啊！」"}, {"id": 78, "title": "某國的獨裁者 一日 他召來朝中諸位參謀大臣 並向", "content": "某國的獨裁者,一日,他召來朝中諸位參謀大臣, 並向大將們宣佈下回征服的目標.\n獨裁者：『我們已征服了大英地國,咱們接下來的目標是美利間堅帝國!』\n大將們：『王上.這項任務是不可能完成的!』 獨裁者：『為什麼?』\n大將們：『那些人早就上月球去了!』 獨裁者：『果真如此?那咱們就到太陽吧.』\n大將們：『我們可能會活活給燒死!』\n獨裁者：『你們以為我是傻瓜嗎?我們當然是在晚上行動!』"}, {"id": 79, "title": "四個退休的傢伙正在打高爾夫球 第一位將他的球打進", "content": "四個退休的傢伙正在打高爾夫球, 第一位將他的球打進樹林,於是在他進入樹林找球之後,其\n他三位的其中一位開腔問:\"鮑伯,你兒子近來如何?\" 鮑伯答:\"我兒子得到一家名牌汽車的經\n銷權,而且今年生意好得不得了.他便送一部車子給他的朋友.\"\n第二個傢伙問:\"比爾,你兒子混的怎樣?\"喬治回答:\"我的兒子得到\n一艘游艇經銷權,今年生意比以往更好.於是他便送了一艘游艇給他的朋友.\"第三個傢伙問\"?\n鴘v,你兒子近來可好?\"喬治說:\"你們知道我兒子是不動產經紀商,今年房地產景氣不錯,他甚\n至送一棟房子給他的朋友.\"這時,到樹林找球的傢伙回來了,於是他的同伴問他說:\"山姆,近?\n荍A兒子怎麼樣?\n\"山姆答:\"我也不很清楚就你們知道我兒子是個同性戀,但他最近一定是走了什麼狗屎運,因?\n陞L的同志\n們,送他一棟房子,一部車子及一艘遊艇."}, {"id": 80, "title": "有一個精神病院裡面有很多病人 有一個精神病醫師為", "content": "有一個精神病院裡面有很多病人,有一個精神病醫師為他們治療了很久想看看有沒有效於是?\nN想看看他們的反應能力.於是就拿了一枝筆在空氣中畫了一道門說:誰能把這道門打開,就可\n以回家看親人囉..\n於是有的人使勁去開,有的人破口大罵門打不開.有的人一直踹門..\n卻有一個人靠在牆上對著那些病患投以不屑的眼光.在一邊偷笑.\n醫師看到了.心裡充滿著 希望.想說終於有一個人比較正常了,於是便問那個人,\"你為啥不去\n開門?'那個病患卻不停的冷笑道:他們怎們可能打得開門呢?.於是慢條斯理的掏出口袋說:因\n為鑰匙在我這!!!"}, {"id": 81, "title": "周六中午 沙鹿國小放學 一群小學生成群結隊的離開", "content": "周六中午,沙鹿國小放學,一群小學生成群結隊的離開校園\n有兩女孩一起走斑馬線過馬路,此時一名機車騎士因\n車速過快,煞車後超過停止超越線,並在那兩女孩之前\n停住,差點就撞上,騎士有點不爽的大罵:那間學校的\n學生?走路慢吞吞的.\n兩學生大聲的說:[沙小](台語)\n這會機車騎士更火大了,問:[甚麼學校的,還說髒話]\n兩學生更大聲的說:[沙小](台語)"}, {"id": 82, "title": "有一次 世界第一男高音 跟世界第二男高音 在街上", "content": "有一次,世界第一男高音,跟世界第二男高音,在街上碰見了身為義大利人的第一男高音,向身\n為西班牙人的第二男高音炫耀說他上上星期在西班牙一間教堂演唱,唱到一半,西班牙的觀眾\n忽然紛紛叫著:『啊.....奇蹟出現了......奇蹟出現了......』\n第一男高音轉頭往身後一看,只見聖母瑪麗亞雕像的臉上,流下了兩行淚水『哦?真是太巧了?\nz第二男高音笑著說,他上星期,很湊巧的,\n反倒是在義大利的一間教堂裡演唱,唱到一半,義大利觀眾忽然紛紛指著他身後叫著:『啊...\n...奇蹟........奇蹟.......』他轉過身一看,只見耶穌從十字架走下握起他的手,由衷的讚\n美:『太好了......你唱的真是太好了啊........比起上星期在西班牙,\n把我老媽都給弄哭了的那個義大利胖子,要好的太多了』"}, {"id": 83, "title": "某老鄉外省口音很重 有一天他去菜市場買魚", "content": "某老鄉外省口音很重, 有一天他去菜市場買魚.\n\"老闆, 這是什麼魚啊?\"\n\"對啊! 還是一早才拿來的,保證新鮮.\"\n\"我問你這是什麼魚!\"\n\"對啊! 賣了這麼多年了, 難道我會不知道這是什麼魚?\"\n\"你不要裝傻, 到底是什麼魚?\"\n\"這就是什麼魚, 難道是蝦不成?\"\n兩人愈吵愈兇, 旁人過來解圍, 才知道原來他說的是\"虱目魚\"."}, {"id": 84, "title": "在美國尋金熱鬧那個時代 一個巡迴演出的高尚劇團", "content": "在美國尋金熱鬧那個時代，一個巡迴演出的高尚劇團，\n想帶一點文化到西部，他們必須面對著一群粗俗的觀眾演出戲劇。\n有一幕是演女主角死掉了，男主角傷心的說：『我該怎麼辦呢？我該怎麼辦呢？』\n樓上廂座立刻有人大叫：『趁她的身體還沒有冰冷以前，趕快和她做愛！』\n這句粗俗話把整個氣氛都破壞了。所以第二天，劇團經理人跑去找警長。告訴他觀眾粗魯的\n表現，破壞了一切氣氛。警長向經理保證，不會再有麻煩發生，而且第二天晚上，警長親自\n帶了兩把槍，坐在第一排。一切都很順利，直到有一幕，男主角吻了女主角，並且對她說：\n『啊！世界上還\n有什麼東西，比妳的紅唇更甜蜜呢？』\n就在這一剎那兒，警長一跳而起，揮舞著雙槍對觀眾說\n『要是哪一個王八蛋敢說是女人的胸部，我就一槍斃了他!!』"}, {"id": 85, "title": "姨 一個女生若主動抓男生的手 是不是表示她喜歡他", "content": "\"姨!一個女生若主動抓男生的手.是不是表示她喜歡他?\"摩摩問.\n\"幹嘛問這?你今天被女生抓手啦?!\" 我說.\n\"是啊!我一直想甩開她的手.她還一面抓.一面說不要這樣嘛!!!\"\n我心想:天啊!!現在女孩子也未免太主動了吧?!於是我問:\n\"那她是在什麼情形下抓你的手?\"\n他說:\"我想掀開她裙子.看她今天穿什麼顏色的內褲.於是她就抓住我的手了!"}, {"id": 86, "title": "有一艘軍艦在夜間巡航 突然看見前方不遠處有燈光", "content": "有一艘軍艦在夜間巡航，突然看見前方不遠處有燈光，為免相撞，於是艦長下令打燈號給對\n方，請對方快點閃開，可是對方也打燈號回來，回覆是：「 不閃！」。艦長很生氣，再打?\nO號給對方說：「我是艦長，你快點閃！」\n對方又回覆：「我是二兵，我不會閃！」。艦長火大了，再打燈號給對方：「我是軍艦，你\n快點閃！」，對方又回覆：「我是燈塔，我不能閃啊！」"}, {"id": 87, "title": "話說國內某電視台美艷女記者H姬 有一次採訪一個大", "content": "話說國內某電視台美艷女記者H姬,有一次採訪一個大規模的\n智障兒童園遊會新聞,當H姬拿起麥克風,整理好儀容,對著電視 攝影機抓住一位智障兒童訪?\n搎?小朋友,今天你開不開心? 這位智障兒很興奮地點點頭,H姬接著又問說: 小朋友,請問你\n知不知道今天來這裡參加什麼活動?這位智障兒顯然有些不悅,他用不太\n清晰但非常肯定的口吻回答H姬說:你智障啊!不會自己看標語!"}, {"id": 88, "title": "高中時我們總要騎腳踏車然後換公車到學校", "content": "高中時我們總要騎腳踏車然後換公車到學校.\n有一天放學之後,我回到公車站,一下車就看到有人在開我腳踏車的鎖,我的腳踏車是用轉盤?\n磢?我就走過去蹲在旁邊看他開鎖.\n等了好久,他打不開也不用剪子剪,我又想回家看卡通,我就對他說你要不要我幫你開.他說好\n,你試試看.沒多久我就把鎖打開了.\n他說,好厲害你學過嗎?\n'沒有,這是我的車子',然後他就跑走了..."}, {"id": 89, "title": "一位魔術師在一艘小游輪上工作 已有一兩年的時間了", "content": "一位魔術師在一艘小游輪上工作，已有一兩年的時間了。\n這兩年來，他每個晚上有一樣的秀場，觀眾們都喜歡他。\n不過，因為觀眾群經常的更換。所以他也就不必要急著學\n新戲法了。但是，幾年下來，坐在後排的鸚鵡經過長期的\n觀察，終於看出了魔術師戲法的破綻，開始當眾拆穿魔術\n師的把戲。\n打個例子，當魔術師把一束花變不見時，這隻鸚鵡會大叫\n說：『在他的後面!在他的後面!』\n這可弄得魔術師火冒三丈，可是他也束手無策。鸚鵡是船\n長的，他動不了牠一根寒毛。\n有一天，這艘船漏水，結果沉了。魔術師設法游到一塊飄\n在水面上的木板，然後抓住木板。這隻鸚鵡正站在木板的\n另一端。他們兩個一路大眼瞪小眼的不說一句話。\n就這樣在水上飄流三天。就在第四天早晨，鸚鵡終於忍不\n住看著魔術師說：『算了，我投降了，你到底把船變到那\n裡去了!』"}, {"id": 90, "title": "一位已婚婦女有了外遇 每次她的情人來了 她就把她", "content": "一位已婚婦女有了外遇，每次她的情人來了，她就把她9歲\n大的兒子關在櫥子裡頭。有一天，這位太太聽見車道有車子\n的聲音，她順手也把她的情人關進櫥子裡。\n在櫥子理裡頭，這小男孩說：『這裡頭真暗。』\n『對啊!』這位男子回答。\n『想不想買個棒球啊?』小男孩問道。\n『不，謝了。』男子回答說。\n『我認為你會想要買個棒球的。』這個小勒索鬼接著說。\n男子衡量了一下自己的處境之後，回答說：『好吧!多少?』\n『25塊!』『25塊!』男子驚訝地重覆了一次，不過他還是收\n 斂了一下，以免被發現。\n接下來的那個星期，這位情人又來婦女的家，不久又聽到車\n道有車子的聲音。婦女又一樣地把兒子和情人一起關在櫥子裡。\n『這裡頭真暗!』小男孩又開始了。\n『對啊!』男子答道。\n『想不想買個棒球套啊?』小男孩問說。\n 男子知道自己占下風，就回答說：『好吧!多少?』\n『50塊!』小男孩答道。交易輕鬆地完成了。\n到了週末，小男孩的父親說：『嘿，兒子啊!去把你的棒球和\n球套拿來。咱們來玩接球。』\n『不行啊，我把那些東西都賣了。』小男孩答說。\n『你賣了多少啊？』\n心想可能只是跟人家換了蜥蜴或糖果之類的東西。\n『75塊!』小男孩答道。\n『75塊?簡直是搶劫嘛!走，跟我到教堂去認罪告解。』父親\n 拉著小男孩邊教訓他說。\n到了教堂，小男孩走進告解室，拉上簾子，坐定之後說：\n『這裡頭真暗!』\n神父回答說：『在這兒，別跟我來那一套!』"}, {"id": 91, "title": "這個男子走進酒吧裡 蓬頭亂髮 看起來非常地落魄", "content": "這個男子走進酒吧裡,蓬頭亂髮,看起來非常地落魄.\n他搖搖晃晃地走到吧台前,雙手抱頭,痛苦地坐在那 裡.\n那裡酒保,是個很有同情心的人,他走到男人面前問\n他說:『兄弟,你怎麼了?』\n他回答:『天啊,我剛才發現我的小弟是個同性戀,\n我無法承受這個事實.』\n酒保倒了一杯酒給他並試著要安慰他.但他將酒一口\n喝完,謝過酒保,就搖著頭走了.\n隔天,同一名男子走進這家酒吧,看起來更頹廢失意.\n『發生什麼事了?』酒保問.\n『唉』那個男子說:『你一定不相信.我的二弟竟然\n也是同性戀.這真是晴天霹歷,我不曉得該怎麼辦.』\n『來』酒保嘆了一口氣又倒了一杯酒給他喝,男子將\n酒一口灌下,之後拖著沉重的腳步離去.\n兩天後,這個飽受折磨的男人又來了.他看起來就像個\n走動的殘骸,一邊啜泣一邊喃喃自語的晃到酒吧前.\n『我的老天.』酒保說,『你怎麼了?』『我-我剛才發\n現我的哥哥也是同性戀.我真的不曉得該怎麼辦.』\n『這怎麼可能!』酒保說:『你家難道沒有人喜歡女\n人嗎?』\n這個可憐的人看著他,眼睛紅紅,無奈的說:『我妹妹!』"}, {"id": 92, "title": "一位妙齡女郎覺得人生無趣 跑去跳樓自殺", "content": "一位妙齡女郎覺得人生無趣,跑去跳樓自殺\n從四十樓跳了下來,可是又後悔了,於是她祈禱\"\n老天啊!救救我吧!任何條件我都答應\"這時,一隻手從三十樓伸出來,\n一個男人抓住了她,威脅說\"我要和妳做愛\"女郎不從,打了男的一巴掌,說\"無恥\",於是這男的\n放手,女郎又往下墜,旋即,她又後悔了,又祈禱\"天啊!救我吧!任何條件我都答應\",而在二十?\n茪S有一個男的抓住了她,說\"我要和妳做愛\",女郎打他一巴掌,罵\"無恥\"這男的也放手,\n女郎再度下墜,這次她真的後悔了,\"天啊!救我吧,這次任何條件我都答應\",在十樓有個男人?\n鴞矰F她,女郎定睛一看,哇!比劉德華還帥,女郎說\"我願意和你做愛\",這男的打了這女郎一巴\n掌,罵說\"無恥\"\n放開了她的手............."}, {"id": 93, "title": "有一位教授 平常上課時喜歡開黃腔 常常惹得上課的", "content": "有一位教授，平常上課時喜歡開黃腔，常常惹得上課的女學生們手足無措。一群女學生在忍\n無可忍的情況下，決定若該教授今天再這麼口無遮攔，她們要集體到教務處去告狀。上課時\n，該教授帶來了一張地圖。那是一張非洲全圖，教授攤開後，便指著其中的一個點，對著同\n學們說，住在這\n個地方的男性土著，都擁有至少三十公分以上的陽具。聽了這句話，女學生們憤怒的一齊站\n起來，往教室門口走去。教授看兒女學生們的舉動，緩緩的對她們說，妳們急也沒用， 到?\no個地方的飛機，一週只有一班。"}, {"id": 94, "title": "有個人養了一隻鬥犬南北到處征戰 攻無不克 戰無不", "content": "有個人養了一隻鬥犬南北到處征戰,攻無不克,戰無不勝\n有天在路上看到了一位老先生牽了一隻狀極魁梧的大犬\n心想這隻狗頗有看頭,於是便興起跟它一較高下的念頭\n年輕人:歐吉桑!! 哩即價狗看起來漢草未賣,來嘎我的比看賣ㄟ好嗎??\n老先生:賣啦!! 不好啦!!\n兩人一直'喬'了半天,路過的人開始圍觀,並有人因此下起注來\n年輕人:歐吉桑!! 比看賣ㄟ啦! 你看連路人都下起注了\n歐吉桑:好啦!! 既然如此就比吧!!\n沒想到一開始還撐不到幾秒年輕人的冠軍犬就被咬死了\n這年輕人很難過,但卻很好奇自己的狗怎會如此不堪一擊\n年輕人:歐吉桑,哩這狗那哈厲害,我這隻狗得過冠軍內,那ㄟ一下就紅嘎死\n歐吉桑:效年ㄟ!!我這隻狗毛阿未剃之前是一隻獅子內!!!"}, {"id": 95, "title": "某個落後地方長年內戰 一軍官苦於人員補充不足 便", "content": "某個落後地方長年內戰,一軍官苦於人員補充不足,便到鄉村地方徵兵.由於沒什麼經費,因此\n當分發到最後一位時槍枝已經不夠了\n於是這位軍官便教他只要拿個木棍裝個樣子嘴裡發出'砰砰'就可以了,若是接近戰則只要喊'\n刺,刺'就行了.這位農夫用此方法果然在戰場上只見前方的敵人不斷地倒下,到最後敵我各只\n剩下一人\n只見農夫'砰砰'沒用,那人還是一直走過來\n於是只好用'刺,刺',沒想到還是沒用於是農夫就被打倒了,只知道當敵人的腳踩過他的身體?\n冱L裡發出了:tank!!tank!!!"}, {"id": 96, "title": "歷史期末考時 有一題填充題", "content": "歷史期末考時，有一題填充題：\n        「黃帝建都『有熊』\n          堯建都『      』\n          舜建都『      』」\n         結果一名學生，竟然寫出以下的答案：\n            「黃帝建都『有熊』\n              堯建都『有獅子』\n              舜建都『有老虎』」"}, {"id": 97, "title": "誤會", "content": "有一位辣妹打行動電話叫計程車...\n車行: 這裡是車行...\n辣妹: 我要叫一台車...\n車行: 好的. 請問您穿什麼衣服?\n辣妹: 紅色開岔連身裙.\n車行: 到那裡?\n辣妹: 到大腿..."}, {"id": 98, "title": "遺傳", "content": "一個男人心情沉重地在酒吧喝酒...\n酒保: 先生! 心情不好嗎? 有心事說出來聽聽嘛!\n男人: 我是同性戀.\n酒保: 那又怎樣?\n男人: 我哥哥也是同性戀!\n酒保: ...\n男人: 更糟的是, 我弟弟也是同性戀!\n酒保: 難道你家沒人喜歡女人?\n男人: 有! 我妹..."}, {"id": 99, "title": "妳知道嗎", "content": "頑固的教授看不慣時下年輕人的愛情觀, 在課堂上發表言論:「最近有篇報導, 我國的未婚成年女性有 90%不是處女, 總統先生對這種事實感到不可思議, 因此寄信給其他 10%保有處女之身的女性。各位女同學, 妳們知道總統信中寫些什麼嗎?」\n大家都搖頭說不知道。\n「真的妳們都不知道!」教授說:「那麼, 妳們都沒有收到信了。」"}, {"id": 100, "title": "一次伯爵", "content": "一個年輕人到一位英國伯爵家做客, 伯爵帶他參觀他的土地.\n\"那是高爾夫球場嗎?\" 年青人問道 .\n\"沒錯, 不過我只打過一次, 那太累人了\" 伯爵答道.\n又走到馬廄, 看到一匹名馬,\n年輕人問道: \"這匹馬跑得很快吧.\"\n\"沒錯, 不過我只騎過一次, 那太累人了\", 伯爵答道.\n走著走著來到網球場, 年輕人說: \"我猜...\"\n\"喔, 這網球我打過一次而已, 那太累人了\", 伯爵答道.\n最後回到房子裡, 伯爵說: \"來, 我跟你介紹, 這個是我的兒子\"\n年輕人跟他握過手後, 回頭向伯爵說道: \"我想這是你的獨生子吧?\""}, {"id": 101, "title": "給大哥", "content": "請不要在KTV服務員進來問：「需要什麼服務時」，回答說：「拍手！」"}, {"id": 102, "title": "寶貝老公", "content": "有緣、無緣、大家來做某，隨便生一個，一堆啦！一堆啦！"}, {"id": 103, "title": "給敬愛的好友們", "content": "請不要叫我阿扁的女兒，實在難以啟口解釋！\t\t\t太平公主留"}, {"id": 104, "title": "想像力特強的容", "content": "當我穿短裙時，說：「蘿蔔並不可恥，可恥的是還有蘿蔔鬚」"}, {"id": 105, "title": "給不知道我說什麼的老阿伯", "content": "到了郵局就要把口罩脫下來啊！我也是這樣說的啊！\n我說：「阿伯，脫（台）口罩一下好嗎？」\n並不是叫你脫褲子跑一圈，OK！"}, {"id": 106, "title": "教授說", "content": "教授說：”今天大家上課秩序都不錯”，唯一的缺點就是．．．．”如果後面聊天的同學，能和中間打牌的同學一樣安靜的話，就不會吵到前面睡覺的同學啦！”"}, {"id": 107, "title": "甲、乙、丙三人在一起", "content": "甲突然說：我昨天和我太太來了四次，結果隔天我太太對我說：「老公，我好愛你哦！」\n乙接著說：我昨天和我太太來了八次，結果隔天我太太對我說：「老公，我這輩子都不會離開你了！」\n結果甲和乙同時問丙說：「那你和你老婆來了多少次？」\n丙回答：「一次」\n甲、乙很不屑的問丙：「那隔天你老婆和你說了什麼？」\n丙回答：「她說，老公不要停！」"}, {"id": 108, "title": "有一天", "content": "有一天，三個日本籍男子在炫耀自己的名字.....\n第一個日本人說：「因為我的慾望太高，所以大家叫我『三天一次郎』」\n第二個日本人說：「哈哈!!有甚麼了不起!!大家都叫我『一天一次郎』\n第二個日本人說完以後，很得意的問第三個人,「那你呢？你叫甚麼名字？」\n第三個日本人說：「跟你一樣啊！」第二個日本人說：「喔？是嗎？」\n第三個日本人又說：「只不過順序不一樣而已.....\n我的名字是『一．次．一．天．郎』！」"}, {"id": 109, "title": "有一架飛機..上面坐有一美國人,...", "content": "有一架飛機..上面坐有一美國人,德國人,日本人及中國人..\n飛機飛到一半...突然沒油了...機長宣佈必須有一人跳機以減輕重量...\n於是那美國人就發揮其世界大老的精神..大喊：美利堅和國萬歲！！\n就一腳跳下去了！.......飛機繼續飛.....這時機長又宣佈...重量又太重了\n於是德國人就站出來了！...接著大喊：德意志帝國萬歲！！..也跟著跳去..\n飛機平穩的繼續飛.....大家都以為沒事了！....結果機長又說：不行..還是重了！.......這時中國人就站出來了！....大喊：中華民國萬歲！！.......\n接著一腳把日本人給....踢下去！！......."}, {"id": 110, "title": "給賣雞的老闆", "content": "請不要在招牌上寫：\n帶出場180元，脫光光230元！\n覺得怪怪的顧客留"}, {"id": 111, "title": "奶精", "content": "某甲去一間咖啡管喝咖啡,當女服務生端來時\n某甲:我想要加奶精只見女服務生解開胸罩,在乳房擠了幾下\n甲:你們的奶精都是這樣的嗎?\n女服務生:不是,奶已經有了,精要你自己提供"}, {"id": 112, "title": "上課中", "content": "某日, 上課時.\n阿呆突然舉手發言:報告老師.\n師:什麼事?\n阿呆:我想上廁所.\n師:...好吧!下不為例,幾號?\n阿呆:報告老師,大號!\n師:喂!我是問座號!"}, {"id": 113, "title": "在一個潘姓老先生的告別式上,", "content": "司儀不太識字操著不太標準的國語說著:\n長子的名字應該是潘金科..但司儀看不懂潘就講成翻...科就講成斗..\n就說: 長子....翻金斗..此時就看到長子當場在告別式上面?\n翻了一個筋斗..全場一面澕然..\n此時輪到長媳祭拜,,,長媳姓池...看司儀又看不懂.池就唸成也司儀就說長媳.....也氏..告別或場上又看到長媳也跟著翻個筋斗\n接下來輪到長孫,,名字潘兩姿..\n司儀又看不懂..又把姿認成次\n就說..長孫..翻兩次....當然長孫也就又在場上連續翻了二次筋斗..\n這個就是潘老先生的告別式..."}, {"id": 114, "title": "一位木匠", "content": "一位木匠，一位牧師和一位國會議員同時間去世，同時升上天堂大門等侯進入天堂。『我\n很抱歉!』守門的聖比得說『今天大門壞了，我正在等人來修理。』\n那位木匠立即上前要幫忙修理，但他要求十美元薪酬。\n『為什麼你要求十美元薪酬？』聖比得不解問道。 ]\n『五元買材料，五元工錢。』木匠回答。\n『你能修理大門嗎？』聖比得問牧師。\n『能！但我的收費是卅美元。』牧師回答?\n『為什麼？』聖比得問道。\n『十元給窮人，十元捐給教會，另外十元捐給孤兒院。』牧師平靜答道。\n『那你能嗎？』聖比得最後問議員。\n『當然能！?\n『什麼？一百一十美元！』聖比得叫道?\n『為什麼？』\n『哦，五十元是給我的，五十元給你，十元給木匠叫他修理大門！』議員回答。"}, {"id": 115, "title": "何攝影師", "content": "何攝影師:麻煩老太婆到攝影機前面，按照我的指示好嗎!\n老太婆:喔,好的沒有什麼問題!\n何攝影師:姿勢擺好了嗎?\n老太婆:好了。\n何攝影師:一二三\"照 ㄗㄠ\\\"\n老太婆突然間逃跑了.\n何攝影師一時不知所措."}, {"id": 116, "title": "有個女生在公車上突然很想放屁,可...", "content": "有個女生在公車上突然很想放屁,可是因為公車上有很多人,所以她就拼命忍耐,就在她快要忍不住的時候,恰巧音樂聲中傳來ㄅㄨ ㄅㄨ ㄅㄨ的聲音\n這個女生心想真是天賜良機,就隨著音樂...,正當她因為解脫而感到心滿意足的時候,卻發現怎麼公\n車上的人都在看她,原來......她在聽隨身聽."}, {"id": 117, "title": "有台發財車載著貨物前往加油站加油", "content": "到達時貨物不小心掉在路上於是車主就跟加油站的小弟說''你幫我加油吧 ...我去把東西檢回來...''\n小弟說  '' 嗯....好.....''\n不久車主再搬貨時.....遠遠的便聽到.....\n小弟拍著手叫喊著 '' 加油 !! 加油 !! 加油 !!..........''"}, {"id": 118, "title": "一位歐巴桑到早餐店買早餐,", "content": "那老板就問:\n請問這位阿婆需要啥麼?\n阿婆道:給我一個三明治!\n老板道:加蛋嘛?\n阿婆道:好!\n老板道:加蛋要加十塊喔!\n阿婆很驚訝地道:那我到外面等好了!!\n(原來阿婆把加蛋聽成這等)"}, {"id": 119, "title": "鐵幕裡有個小學因為督學要來視察正忙著準備．．．", "content": "老師：「督學一來一定會先問第一排第一位同學『你們是吃誰的奶水長大的？』」\n小明：「我知道，是共產黨。」\n老師：「接著督學一定問後面一位同學，『你們最大的敵人是誰？』」\n小新：「是美帝。」\n老師：「很好，等一下不要答錯了。」\n過了一會兒，校長陪著督學來了，但就在督學來的前一分鐘，小明因為吃壞肚子\n到廁所去了。\n督學一看第一個位子是空的，便問後面的小新：\n「你們是誰的孩子？」\n「是美帝。」小新很得意的回答，因為這是他準備好的答案。\n督學氣得臉都綠了，轉頭瞪著校長，\n校長急問：「難道你們都不知道你們是吃誰的奶水長大的嗎？」\n「那個吃共產黨奶水長大的孩子，因為吃壞了肚子，到廁所裡去了。」小新答。"}, {"id": 120, "title": "有個男人在家Pub看上個女孩", "content": "有個男人在家Pub看上個女孩，便上前搭訕。\n\"小姐，我想請妳喝杯酒。\"\n\"什麼！上賓館！\"女孩出乎意料的尖叫。\n許多客人轉頭來看著那個男人，男人面紅耳赤的解釋：\"小姐妳誤會了，我只是想請妳喝杯酒聊聊天。\"\n\"啊！！汽車旅館！？\"女孩還是尖叫著。\n男人覺得很羞愧的走到角落，納悶的喝著酒。\n一會女孩走過來：\"先生對不起，我是心理系的學生，我在測試一個男人在那種情況下的反應是什麼。\"\n\"什麼！要五千！\"男人大聲嚷嚷著。"}, {"id": 121, "title": "有一天", "content": "有一天，有二位老師在聊天，聊著聊著，王老師就對林老師說，我覺得我家的狗最聰明，\n林老師馬上說，我家的貓比你家的狗聰明多了！\n因此兩個人就開始吵了起來，後來林老師就說，我問我家的貓說「要去哪裡拜拜？」\n我家的貓會說「喵～裡」\n王老師就很得意地說，那有什麼稀奇，我問我家的狗「拜拜要帶什麼？」\n我家的狗會說「汪汪」。"}, {"id": 122, "title": "警察", "content": "警察:你沒有看見牌子上寫\"嚴禁釣魚,違著罰1000元\"嗎?\n釣客:偶不素在釣疑,偶素在教偶的蚯蚓游泳啦.\n警察:你的蚯蚓有穿泳裝嗎?\n釣客:............\n警察:\"妨害風化\"罰5000\n釣客:@#%$!1#%"}, {"id": 123, "title": "台灣人沒這麼笨", "content": "一個南韓人花十幾年學會了流利的中文、台語和客家話，完全沒有腔調 。他在高雄小漁港遇到一位捕虱目魚的阿伯，想考阿伯猜他是哪裡人 。阿伯說如果他能用台語把抓到的虱目魚數完就猜得出來 。南韓人花了一個多小時，用極其標準的發音數完並回答「九千七百八十七尾」 。阿伯一聽立刻笑說：「你一定是南韓人！因為台灣人沒這麼笨的啦！」"}, {"id": 124, "title": "站得起來就不用退休", "content": "大腦召集身體器官開會 。會後臨時動議時，肺臟因為主人抽菸50多年申請退休，胃也因為主人暴飲暴食且便後不洗手而要求退休，大腦都表示會考慮 。這時會場後面傳來微弱的聲音說也想退休 。大腦問是誰、請站起來發言，那微弱的聲音回答：「我……我……要……是……站……得……起……來……就不……用退……休……了……」"}, {"id": 125, "title": "身不由己生得低", "content": "于右任與吳稚暉兩位老先生一起去遊山玩水，為了省時間決定涉水走過新店溪。走到溪水中央時，于右任心血來潮吟出上聯：「哥倆攜手度河溪」，吳稚暉馬上對出下聯：「二老鬍鬚一般齊」。這時對面洗衣服的歐巴桑抬頭瞄了他們一眼，心裡嘀咕著：「什麼！！鬍鬚？？老娘也有！！只不過……身不由己生得低。」"}, {"id": 126, "title": "一定得公牛才行", "content": "一位小姐到鄉下旅行，看到一個小男孩滿身是汗地拉著一頭牛。小姐好奇問他要把牛牽去哪裡，男孩回答要到隔壁村去和母牛配種。小姐又問：「難道這工作不能叫你父親做嗎？」男孩著急地回答：「不行！一定得公牛才行！」"}, {"id": 127, "title": "把口水吐在正面", "content": "某國總統為了提高聲望，發行了印有自己肖像的郵票。一個多月後他到郵局視察銷售情況，員工反映郵票不錯，但常有人抱怨貼不牢。總統不信，順手拿起一張郵票，在背面吐了口水用力黏在紙上，得意地說：「你看這不是貼得很牢嗎？！」員工尷尬地回答：「可是……大家都……把口水……吐在正面……」"}, {"id": 128, "title": "第三次尿在冰箱", "content": "一個醉鬼回家爬上床叫醒老婆，驚恐地說家裡鬧鬼了，因為他剛才去上廁所，一開門燈就亮了，而且還有陣陣陰風吹出來 。老婆聽完狠狠打了拉他一巴掌說：「死鬼！這是你第三次喝醉了尿在冰箱裡！」"}, {"id": 129, "title": "如果妳先死我也一樣", "content": "一對年老的夫妻討論將來的後事。丈夫問妻子：「假如我先去世，妳怎麼辦？」妻子沉思片刻，說以她活潑的性格，會找幾個比她年輕的單身女人或寡婦一起同住。接著妻子反問丈夫：「那麼，如果我先死，你又會如何做？」丈夫回答：「大概一樣，與妳說的類似！」"}, {"id": 130, "title": "關節炎的成因", "content": "一個邋遢、滿身酒氣且帶著空酒瓶的醉漢在公車上坐在神父隔壁。他看著報紙突然問神父：「神父，得關節炎的原因是什麼？」神父藉機訓誡道：「這是因為浪費生命、和妓女鬼混、酗酒和不自重所引起的。」醉漢聽了喃喃自語後繼續看報。神父覺得自己話說得太重，便向醉漢道歉並關心他患病多久了。醉漢回答：「不是我，神父，我只是看到報紙上寫說教皇得了關節炎。」"}, {"id": 131, "title": "聽錯藥方暴斃", "content": "報紙報導一名男子到藥房買壯陽藥，老闆用台語叮嚀他「甲飽五粒（吃飽服五顆）」，但他高高高興興回家服用後當晚卻暴斃了。法醫驗屍才發現，原來他把老闆的話聽成了台語的「甲佰五粒（吃一百五十顆）」。"}, {"id": 132, "title": "拔得太慢", "content": "某次生物期中考，老師故意出了一道刁鑽的題目：「蛀牙、爛蘿蔔、懷孕三者有何相同？」考卷發下來多數人都不及格，但有兩位得80分的同學答案寫「都是蟲在做怪」 。而拿到100分的同學，答案則寫著：「拔得太慢」"}, {"id": 133, "title": "你某 C 在那邊", "content": "一對不懂英文的老夫婦搭飛機去美國看孩子。登機後因為看不懂英文找不到座位，歐里桑便用台語向空服小姐詢問座位在哪裡。空服小姐看了看他們的登機證，也用台語親切地回答：「你是 D（豬），啊你某 C（死）在那邊。」"}, {"id": 134, "title": "誰在黑板上畫屁股", "content": "幼稚園老師在黑板上畫了一個蘋果，問小朋友畫的是什麼，結果小朋友異口同聲地回答「屁股！」 老師怎麼引導，大家還是堅持是屁股，老師氣哭跑去找校長 。校長趕到教室批評小朋友怎麼氣哭老師，結果一轉身看到黑板，大怒道：「誰？這是誰幹的！是誰在黑板上畫了個屁股欺負老師？」"}];

        if (localStorage.getItem('joke_favorites')) {
            try {
                favoriteIds = JSON.parse(localStorage.getItem('joke_favorites'));
            } catch(e) {
                favoriteIds = [];
            }
        }

        function switchMode(mode) {
            currentMode = mode;
            currentPage = 1;
            document.getElementById('tab-all').classList.toggle('active', mode === 'all');
            document.getElementById('tab-fav').classList.toggle('active', mode === 'fav');
            renderJokes();
        }

        function handleSearch() {
            searchQuery = document.getElementById('search-input').value.trim().toLowerCase();
            currentPage = 1;
            renderJokes();
        }

        function renderJokes() {
            const container = document.getElementById('jokes-list');
            container.innerHTML = '';

            let filteredJokes = allJokes;
            if (currentMode === 'fav') {
                filteredJokes = allJokes.filter(joke => favoriteIds.includes(joke.id));
            }

            if (searchQuery) {
                filteredJokes = filteredJokes.filter(joke => 
                    joke.title.toLowerCase().includes(searchQuery) || 
                    joke.content.toLowerCase().includes(searchQuery)
                );
            }

            if (filteredJokes.length === 0) {
                container.innerHTML = `<div class="no-data">${currentMode === 'fav' ? '目前沒有符合搜尋或收藏的笑話喔！' : '找不到相關的笑話。'}</div>`;
                document.getElementById('pagination-controls').style.display = 'none';
                return;
            }

            document.getElementById('pagination-controls').style.display = 'flex';

            const totalPages = Math.ceil(filteredJokes.length / pageSize);
            if (currentPage > totalPages) currentPage = totalPages || 1;

            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = Math.min(startIndex + pageSize, filteredJokes.length);
            const pageJokes = filteredJokes.slice(startIndex, endIndex);

            pageJokes.forEach(joke => {
                const isFav = favoriteIds.includes(joke.id);
                const card = document.createElement('div');
                card.className = 'joke-card';
                card.innerHTML = `
                    <div class="joke-header">
                        <span class="joke-title">${escapeHtml(joke.title)}</span>
                        <span class="joke-id">編號: ${joke.id}</span>
                    </div>
                    <div class="joke-content">${escapeHtml(joke.content)}</div>
                    <button class="fav-btn ${isFav ? 'is-fav' : ''}" onclick="toggleFavorite(${joke.id})">
                        ${isFav ? '♥' : '♡'}
                    </button>
                `;
                container.appendChild(card);
            });

            document.getElementById('page-info').innerText = `第 ${currentPage} / ${totalPages} 頁 (共 ${filteredJokes.length} 篇)`;
            document.getElementById('btn-prev').disabled = currentPage === 1;
            document.getElementById('btn-next').disabled = currentPage === totalPages;
        }

        function changePage(direction) {
            currentPage += direction;
            renderJokes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function toggleFavorite(id) {
            const index = favoriteIds.indexOf(id);
            if (index === -1) {
                favoriteIds.push(id);
            } else {
                favoriteIds.splice(index, 1);
            }
            localStorage.setItem('joke_favorites', JSON.stringify(favoriteIds));
            renderJokes();
        }

        function escapeHtml(string) {
            return String(string).replace(/[&<>"']/g, function (s) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[s];
            });
        }

        renderJokes();
    </script>
</body>
</html>
